media:
  input: assets/images/uploads
  output: /assets/images/uploads

collections:
  - name: news
    label: News & Events
    folder: content/news
    create: true
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Date
        type: date
      - name: category
        label: Category
        type: select
        options:
          - News
          - Event
          - Competition
          - Announcement
          - Success Story
      - name: body
        label: Content
        type: markdown

  - name: courses
    label: Courses
    folder: content/courses
    create: true
    fields:
      - name: title
        label: Course Name
        type: string
        required: true
      - name: icon
        label: Icon (Emoji)
        type: string
      - name: category
        label: Category
        type: select
        options:
          - hair
          - makeup
          - nails
          - skincare
          - certification
      - name: level
        label: Level
        type: string
      - name: duration
        label: Duration
        type: string
      - name: certification
        label: Certification
        type: string
      - name: description
        label: Short Description
        type: text
      - name: body
        label: Full Details
        type: markdown
