backend:
  name: github
  repo: peacemakersclub/lovelyaccadamy
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "news"
    label: "News & Events"
    folder: "content/news"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Category", name: "category", widget: "select", options: ["News", "Event", "Competition", "Announcement", "Success Story"] }
      - { label: "Content", name: "body", widget: "markdown" }

  - name: "courses"
    label: "Courses"
    folder: "content/courses"
    create: true
    fields:
      - { label: "Course Name", name: "title", widget: "string" }
      - { label: "Icon", name: "icon", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["hair", "makeup", "nails", "skincare", "certification"] }
      - { label: "Level", name: "level", widget: "string" }
      - { label: "Duration", name: "duration", widget: "string" }
      - { label: "Certification", name: "certification", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Full Details", name: "body", widget: "markdown" }
