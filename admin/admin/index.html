<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Manager | Lovely Beauty College</title>
    <link rel="icon" href="../logo.jpg">
</head>
<body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
        // GitHub OAuth Client ID
        const GITHUB_CLIENT_ID = 'Ov23liXOn8EDq3ogRujc';
        
        CMS.init({
            config: {
                backend: {
                    name: 'github',
                    repo: 'Peacemakersclub/lovelyaccadamy',
                    branch: 'main'
                },
                media_folder: 'assets/images/uploads',
                public_folder: '/assets/images/uploads',
                collections: [
                    {
                        name: 'news',
                        label: 'News & Events',
                        folder: 'content/news',
                        create: true,
                        slug: '{{year}}-{{month}}-{{day}}-{{slug}}',
                        fields: [
                            {label: 'Title', name: 'title', widget: 'string'},
                            {label: 'Publish Date', name: 'date', widget: 'datetime'},
                            {label: 'Category', name: 'category', widget: 'select', options: ['News', 'Event', 'Competition', 'Announcement', 'Success Story']},
                            {label: 'Featured Image', name: 'image', widget: 'image', required: false},
                            {label: 'Content', name: 'body', widget: 'markdown'}
                        ]
                    }
                ]
            }
        });
        
        // Override auth to use client-side OAuth
        window.addEventListener('load', function() {
            setTimeout(() => {
                const originalFetch = window.fetch;
                window.fetch = function(url, options) {
                    if (url.includes('auth')) {
                        const redirectUri = window.location.origin + '/lovelyaccadamy/admin/';
                        const authUrl = `https://github.com/login/oauth/authorize?client_id=${GITHUB_CLIENT_ID}&redirect_uri=${encodeURIComponent(redirectUri)}&scope=repo,user`;
                        window.location.href = authUrl;
                        return Promise.reject('Redirecting to GitHub');
                    }
                    return originalFetch.apply(this, arguments);
                };
            }, 1000);
        });
    </script>
</body>
</html>
