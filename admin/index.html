 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Manager | Lovely Beauty College</title>
    <link rel="icon" href="../logo.jpg">
    <style>
        body { margin: 0; padding: 0; background: #0A0A0A; }
    </style>
</head>
<body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
        CMS.init({
            config: {
                backend: {
                    name: 'github',
                    repo: 'Peacemakersclub/lovelyaccadamy',
                    branch: 'main',
                    base_url: 'https://decap-cms-github-oauth.vercel.app',
                    auth_endpoint: 'auth'
                },
                media_folder: 'assets/images/uploads',
                public_folder: '/assets/images/uploads',
                collections: [
                    {
                        name: 'news',
                        label: 'News & Events',
                        folder: 'content/news',
                        create: true,
                        slug: '{{year}}-{{month}}-{{day}}-{{slug}}',
                        fields: [
                            {label: 'Title', name: 'title', widget: 'string'},
                            {label: 'Publish Date', name: 'date', widget: 'datetime'},
                            {label: 'Category', name: 'category', widget: 'select', options: ['News', 'Event', 'Competition', 'Announcement', 'Success Story']},
                            {label: 'Featured Image', name: 'image', widget: 'image', required: false},
                            {label: 'Content', name: 'body', widget: 'markdown'}
                        ]
                    }
                ]
            }
        });
    </script>
</body>
</html>
