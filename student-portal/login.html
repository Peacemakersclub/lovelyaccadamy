<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Student Login | Lovely Plus Beauty College</title>
    <meta name="description" content="Student portal login for Lovely Plus Beauty College. Access your courses, attendance, grades, and certificates.">
    
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💎</text></svg>">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --black-primary: #0A0A0A;
            --black-secondary: #111111;
            --black-card: #1A1A1A;
            --gold-primary: #D4AF37;
            --gold-light: #F5D76E;
            --gold-dark: #996515;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --white: #FFFFFF;
            --gray-light: #E0E0E0;
            --gray-mid: #B0B0B0;
            --gray-dark: #666666;
            
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Poppins', sans-serif;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font-body);
            background: linear-gradient(135deg, #0A0A0A 0%, #1A1A1A 50%, #0A0A0A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            padding: 20px;
        }
        
        .login-container {
            width: 100%;
            max-width: 450px;
        }
        
        .login-card {
            background: var(--black-card);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }
        
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
        }
        
        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--gold-primary), var(--gold-dark));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 0 20px var(--gold-glow);
        }
        
        .logo-text {
            font-family: var(--font-heading);
            font-weight: 700;
            line-height: 1.2;
        }
        
        .logo-main {
            font-size: 22px;
            color: var(--gold-primary);
            letter-spacing: 2px;
        }
        
        .logo-sub {
            font-size: 10px;
            color: var(--gray-mid);
            letter-spacing: 1px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .login-header h2 {
            font-family: var(--font-heading);
            color: var(--gold-primary);
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .login-header p {
            color: var(--gray-mid);
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-group label {
            display: block;
            color: var(--gold-primary);
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--black-secondary);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            color: var(--white);
            font-family: var(--font-body);
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--gold-primary);
            box-shadow: 0 0 0 3px var(--gold-glow);
        }
        
        .form-group input::placeholder {
            color: var(--gray-dark);
        }
        
        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gray-mid);
            font-size: 14px;
        }
        
        .remember-me input {
            accent-color: var(--gold-primary);
            width: 16px;
            height: 16px;
        }
        
        .forgot-password {
            color: var(--gold-primary);
            font-size: 14px;
            text-decoration: none;
        }
        
        .forgot-password:hover {
            text-decoration: underline;
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold-primary), var(--gold-dark));
            color: var(--black-primary);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--gold-glow);
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--gold-glow);
        }
        
        .login-footer {
            text-align: center;
            margin-top: 24px;
            color: var(--gray-mid);
            font-size: 14px;
        }
        
        .login-footer a {
            color: var(--gold-primary);
            text-decoration: none;
        }
        
        .login-footer a:hover {
            text-decoration: underline;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: var(--gray-dark);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }
        
        .back-link a:hover {
            color: var(--gold-primary);
        }
        
        .demo-note {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            padding: 16px;
            margin-top: 24px;
            text-align: center;
        }
        
        .demo-note p {
            color: var(--gold-primary);
            font-size: 13px;
            margin-bottom: 8px;
        }
        
        .demo-note code {
            background: var(--black-primary);
            padding: 4px 8px;
            border-radius: 6px;
            color: var(--gold-light);
            font-family: monospace;
        }
        
        .error-message {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid #dc3545;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            color: #dc3545;
            font-size: 14px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .lang-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: transparent;
            border: 1px solid var(--gold-primary);
            color: var(--gold-primary);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1000;
        }
        
        .lang-toggle:hover {
            background: var(--gold-primary);
            color: var(--black-primary);
        }
        
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    
    <button class="lang-toggle" id="langToggle">አማ / EN</button>
    
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">💎</div>
                <div class="logo-text">
                    <div class="logo-main">LOVELY BEAUTY</div>
                    <div class="logo-sub">EST 1998 G.C.</div>
                </div>
            </div>
            
            <div class="login-header">
                <h2 data-en="Student Portal" data-am="የተማሪ ፖርታል">Student Portal</h2>
                <p data-en="Login to access your courses and progress" data-am="ኮርሶችዎን እና እድገትዎን ለመድረስ ይግቡ">Login to access your courses and progress</p>
            </div>
            
            <div class="error-message" id="errorMessage"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label data-en="Email or Student ID" data-am="ኢሜይል ወይም የተማሪ መታወቂያ">Email or Student ID</label>
                    <input type="text" id="username" name="username" placeholder="student@lovelybeauty.com" required>
                </div>
                
                <div class="form-group">
                    <label data-en="Password" data-am="የይለፍ ቃል">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span data-en="Remember me" data-am="አስታውሰኝ">Remember me</span>
                    </label>
                    <a href="#" class="forgot-password" data-en="Forgot password?" data-am="የይለፍ ቃል ረሳሁ?">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn-login" data-en="Login to Portal" data-am="ወደ ፖርታል ይግቡ">Login to Portal</button>
            </form>
            
            <div class="login-footer">
                <p>
                    <span data-en="Don't have an account?" data-am="መለያ የሎትም?">Don't have an account?</span>
                    <a href="../register.html" data-en="Register here" data-am="እዚህ ይመዝገቡ">Register here</a>
                </p>
            </div>
            
            <div class="demo-note">
                <p data-en="📝 Demo Credentials" data-am="📝 የማሳያ መለያ">📝 Demo Credentials</p>
                <code>student@lovely.com / lovely2024</code>
            </div>
        </div>
        
        <div class="back-link">
            <a href="../index.html">← <span data-en="Back to Homepage" data-am="ወደ መነሻ ገፅ ተመለስ">Back to Homepage</span></a>
        </div>
    </div>
    
    <script>
        // Language Toggle
        let currentLang = localStorage.getItem('lovelyLang') || 'en';
        
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lovelyLang', lang);
            
            const elements = document.querySelectorAll('[data-en][data-am]');
            elements.forEach(el => {
                const text = el.getAttribute(`data-${lang}`);
                if (text) el.textContent = text;
            });
            
            const langToggle = document.getElementById('langToggle');
            if (langToggle) {
                langToggle.textContent = lang === 'en' ? 'አማ / EN' : 'EN / አማ';
            }
            
            document.documentElement.lang = lang;
            
            // Update placeholders
            const usernameInput = document.getElementById('username');
            if (usernameInput) {
                usernameInput.placeholder = lang === 'en' ? 'student@lovelybeauty.com' : 'student@lovelybeauty.com';
            }
        }
        
        const langToggle = document.getElementById('langToggle');
        if (langToggle) {
            langToggle.addEventListener('click', () => {
                setLanguage(currentLang === 'en' ? 'am' : 'en');
            });
        }
        
        setLanguage(currentLang);
        
        // Demo Login Functionality
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        
        // Demo credentials
        const DEMO_CREDENTIALS = {
            username: 'student@lovely.com',
            password: 'lovely2024'
        };
        
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            // Check credentials
            if (username === DEMO_CREDENTIALS.username && password === DEMO_CREDENTIALS.password) {
                // Store auth state
                const authData = {
                    username: username,
                    name: 'Helen Tesfaye',
                    studentId: 'LBC-2024-001',
                    loggedIn: true,
                    timestamp: new Date().toISOString()
                };
                
                if (remember) {
                    localStorage.setItem('lovelyStudentAuth', JSON.stringify(authData));
                } else {
                    sessionStorage.setItem('lovelyStudentAuth', JSON.stringify(authData));
                }
                
                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            } else {
                // Show error
                errorMessage.classList.add('show');
                errorMessage.textContent = currentLang === 'en' 
                    ? 'Invalid username or password. Please try again.' 
                    : 'የተሳሳተ የተጠቃሚ ስም ወይም የይለፍ ቃል። እባክዎ እንደገና ይሞክሩ።';
            }
        });
        
        // Clear error on input
        document.getElementById('username').addEventListener('input', () => {
            errorMessage.classList.remove('show');
        });
        document.getElementById('password').addEventListener('input', () => {
            errorMessage.classList.remove('show');
        });
        
        // Check if already logged in
        const storedAuth = localStorage.getItem('lovelyStudentAuth') || sessionStorage.getItem('lovelyStudentAuth');
        if (storedAuth) {
            try {
                const authData = JSON.parse(storedAuth);
                if (authData.loggedIn) {
                    // Auto-redirect to dashboard
                    window.location.href = 'dashboard.html';
                }
            } catch (e) {
                console.error('Invalid auth data');
            }
        }
        
        console.log('🌟 Lovely Beauty College - Student Login Page');
        console.log('📝 Demo: student@lovely.com / lovely2024');
    </script>
</body>
</html>
