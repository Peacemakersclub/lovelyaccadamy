<!DOCTYPE html>
<html>
<head>
    <title>Quick Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body style="background:#0A0A0A; color:white; padding:20px;">
    <h2>Direct Database Test</h2>
    <button onclick="testStudent()" style="padding:20px; background:#D4AF37; border:none; border-radius:10px; font-size:18px;">Find LBC-001</button>
    <pre id="result" style="margin-top:20px; padding:15px; background:#111; color:#0f0;"></pre>
    
    <script>
        const SUPABASE_URL = 'https://pmdrwwaztyfffnkrvwkq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtZHJ3d2F6dHlmZmZua3J2d2txIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODAzNzYsImV4cCI6MjA5MTY1NjM3Nn0.IKQ1eevZaO6uluDUU8PaqrD4uuQNy_Ex61n_dD2Qa8g';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function testStudent() {
            const result = document.getElementById('result');
            result.textContent = 'Searching for LBC-001...';
            
            const { data, error } = await supabase
                .from('students')
                .select('*')
                .eq('student_id', 'LBC-001');
            
            if (error) {
                result.textContent = '❌ ERROR: ' + JSON.stringify(error, null, 2);
            } else if (!data || data.length === 0) {
                result.textContent = '❌ Student LBC-001 NOT FOUND in database!';
            } else {
                result.textContent = '✅ STUDENT FOUND!\n' + JSON.stringify(data[0], null, 2);
                result.style.color = '#4CAF50';
            }
        }
        
        // Auto-run on page load
        window.onload = testStudent;
    </script>
</body>
</html>
