<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Register Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        body { background: #0A0A0A; color: white; font-family: Arial; padding: 20px; }
        input { padding: 15px; margin: 10px 0; width: 100%; background: black; color: white; border: 1px solid #D4AF37; border-radius: 10px; }
        button { padding: 15px; background: #D4AF37; color: black; border: none; border-radius: 10px; width: 100%; font-size: 18px; }
        .result { margin-top: 20px; padding: 15px; border-radius: 10px; }
        .success { background: #1a3a1a; border: 1px solid #4CAF50; color: #4CAF50; }
        .error { background: #3a1a1a; border: 1px solid #f44336; color: #f44336; }
    </style>
</head>
<body>
    <h2>Simple Registration Test</h2>
    
    <input type="text" id="fullName" placeholder="Full Name" value="Test Student">
    <input type="email" id="email" placeholder="Email" value="test123@test.com">
    <input type="password" id="password" placeholder="Password" value="test123456">
    
    <button onclick="register()">Register</button>
    
    <div id="result"></div>

    <script>
        const SUPABASE_URL = 'https://pmdrwwaztyfffnkrvwkq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtZHJ3d2F6dHlmZmZua3J2d2txIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODAzNzYsImV4cCI6MjA5MTY1NjM3Nn0.IKQ1eevZaO6uluDUU8PaqrD4uuQNy_Ex61n_dD2Qa8g';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function register() {
            const result = document.getElementById('result');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('fullName').value;
            
            result.innerHTML = 'Registering...';
            result.className = 'result';
            
            // Step 1: Sign up
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: { full_name: fullName }
                }
            });
            
            if (error) {
                result.innerHTML = '❌ Error: ' + error.message;
                result.className = 'result error';
                return;
            }
            
            result.innerHTML = '✅ SUCCESS!<br>';
            result.innerHTML += 'User ID: ' + data.user.id + '<br>';
            result.innerHTML += 'Email: ' + data.user.email + '<br>';
            result.innerHTML += '<br>✅ Check Supabase → Authentication → Users';
            result.className = 'result success';
        }
    </script>
</body>
</html>
