<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | Lovely Beauty College</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0A0A0A 0%, #1A1A1A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            max-width: 420px;
            width: 100%;
        }
        .login-card {
            background: #1A1A1A;
            border: 2px solid #D4AF37;
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.15);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 {
            font-family: 'Playfair Display', serif;
            color: #D4AF37;
            font-size: 26px;
            letter-spacing: 2px;
        }
        .logo p {
            color: #B0B0B0;
            font-size: 11px;
            letter-spacing: 2px;
        }
        h2 {
            color: #D4AF37;
            font-family: 'Playfair Display', serif;
            text-align: center;
            font-size: 20px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #B0B0B0;
            text-align: center;
            font-size: 13px;
            margin-bottom: 28px;
        }
        .input-group {
            margin-bottom: 18px;
        }
        .input-group label {
            display: block;
            color: #D4AF37;
            font-size: 13px;
            margin-bottom: 6px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: #0A0A0A;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 15px;
        }
        .input-group input:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        }
        .input-group input::placeholder {
            color: #666;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #D4AF37;
            color: #0A0A0A;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin: 20px 0 16px;
            transition: all 0.3s;
        }
        .login-btn:hover {
            background: #F5D76E;
            transform: translateY(-2px);
        }
        .demo-box {
            background: rgba(212, 175, 55, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 10px;
            padding: 14px;
            text-align: center;
            margin: 20px 0;
        }
        .demo-box p {
            color: #D4AF37;
            font-size: 12px;
            margin-bottom: 6px;
        }
        .demo-box code {
            background: #0A0A0A;
            padding: 6px 12px;
            border-radius: 6px;
            color: #F5D76E;
            font-family: monospace;
        }
        .register-link {
            text-align: center;
            color: #B0B0B0;
            font-size: 13px;
        }
        .register-link a {
            color: #D4AF37;
            text-decoration: none;
        }
        .back-link {
            text-align: center;
            margin-top: 16px;
        }
        .back-link a {
            color: #666;
            text-decoration: none;
            font-size: 13px;
        }
        .back-link a:hover {
            color: #D4AF37;
        }
        .error-msg {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid #dc3545;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 16px;
            color: #dc3545;
            font-size: 13px;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1>LOVELY BEAUTY</h1>
                <p>EST 1998 G.C.</p>
            </div>
            <h2>Student Portal</h2>
            <p class="subtitle">Login to access your courses</p>
            
            <div class="error-msg" id="errorMsg"></div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>Email or Student ID</label>
                    <input type="text" id="username" placeholder="student@lovely.com" value="student@lovely.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" value="lovely2024" required>
                </div>
                <button type="submit" class="login-btn">Login to Portal</button>
            </form>
            
            <div class="demo-box">
                <p>📝 Demo Credentials</p>
                <code>student@lovely.com / lovely2024</code>
            </div>
            
            <div class="register-link">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
            
            <div class="back-link">
                <a href="index.html">← Back to Homepage</a>
            </div>
        </div>
    </div>
    
    <script>
        const DEMO = { username: 'student@lovely.com', password: 'lovely2024' };
        
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            if (username === DEMO.username && password === DEMO.password) {
                localStorage.setItem('lovelyAuth', JSON.stringify({
                    name: 'Helen Tesfaye',
                    studentId: 'LBC-2024-001',
                    loggedIn: true
                }));
                window.location.href = 'student-dashboard.html';
            } else {
                errorMsg.classList.add('show');
                errorMsg.textContent = 'Invalid credentials. Use the demo credentials below.';
            }
        });
        
        document.getElementById('username').addEventListener('input', () => {
            document.getElementById('errorMsg').classList.remove('show');
        });
    </script>
</body>
</html>
