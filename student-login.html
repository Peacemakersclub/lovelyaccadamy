<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | Lovely Beauty College</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --black-primary: #0A0A0A;
            --black-secondary: #111111;
            --black-card: #1A1A1A;
            --gold-primary: #D4AF37;
            --gold-light: #F5D76E;
            --gold-dark: #996515;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --white: #FFFFFF;
            --gray-mid: #B0B0B0;
            --header-height: 80px;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0A0A0A 0%, #1A1A1A 100%);
            min-height: 100vh;
            color: var(--white);
        }
        
        /* ============================================
           HEADER (Same as homepage)
           ============================================ */
        .header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--black-primary);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        
        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: var(--header-height);
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        
        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--gold-primary), var(--gold-dark));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 20px var(--gold-glow);
        }
        
        .logo-text {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            line-height: 1.2;
        }
        
        .logo-main {
            font-size: 22px;
            color: var(--gold-primary);
            letter-spacing: 2px;
        }
        
        .logo-sub {
            font-size: 11px;
            color: var(--gray-mid);
            letter-spacing: 1px;
        }
        
        .nav-menu {
            display: flex;
            align-items: center;
            gap: 32px;
        }
        
        .nav-link {
            font-weight: 500;
            font-size: 15px;
            color: var(--gray-mid);
            position: relative;
            padding: 8px 0;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .nav-link:hover {
            color: var(--gold-primary);
        }
        
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gold-primary);
            transition: width 0.3s ease;
        }
        
        .nav-link:hover::after {
            width: 100%;
        }
        
        .nav-link.active {
            color: var(--gold-primary);
        }
        
        .nav-link.active::after {
            width: 100%;
        }
        
        .mobile-menu-btn {
            display: none;
            background: transparent;
            border: none;
            color: var(--white);
            font-size: 28px;
            cursor: pointer;
        }
        
        /* ============================================
           LOGIN CONTAINER
           ============================================ */
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - var(--header-height));
            padding: 40px 20px;
        }
        
        .login-container {
            max-width: 420px;
            width: 100%;
        }
        
        .login-card {
            background: var(--black-card);
            border: 2px solid var(--gold-primary);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.15);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .login-header h2 {
            font-family: 'Playfair Display', serif;
            color: var(--gold-primary);
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .login-header p {
            color: var(--gray-mid);
            font-size: 13px;
        }
        
        .input-group {
            margin-bottom: 18px;
        }
        
        .input-group label {
            display: block;
            color: var(--gold-primary);
            font-size: 13px;
            margin-bottom: 6px;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: #0A0A0A;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 15px;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: var(--gold-primary);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        }
        
        .input-group input::placeholder {
            color: #666;
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--gold-primary);
            color: #0A0A0A;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin: 20px 0 16px;
            transition: all 0.3s;
        }
        
        .login-btn:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
        }
        
        .demo-box {
            background: rgba(212, 175, 55, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 10px;
            padding: 14px;
            text-align: center;
            margin: 20px 0;
        }
        
        .demo-box p {
            color: var(--gold-primary);
            font-size: 12px;
            margin-bottom: 6px;
        }
        
        .demo-box code {
            background: #0A0A0A;
            padding: 6px 12px;
            border-radius: 6px;
            color: var(--gold-light);
            font-family: monospace;
        }
        
        .register-link {
            text-align: center;
            color: var(--gray-mid);
            font-size: 13px;
        }
        
        .register-link a {
            color: var(--gold-primary);
            text-decoration: none;
        }
        
        .back-link {
            text-align: center;
            margin-top: 16px;
        }
        
        .back-link a {
            color: #666;
            text-decoration: none;
            font-size: 13px;
        }
        
        .back-link a:hover {
            color: var(--gold-primary);
        }
        
        .error-msg {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid #dc3545;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 16px;
            color: #dc3545;
            font-size: 13px;
            display: none;
        }
        
        .error-msg.show {
            display: block;
        }
        
        .error-msg.success {
            background: rgba(212, 175, 55, 0.15);
            border-color: var(--gold-primary);
            color: var(--gold-primary);
        }
        
        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 768px) {
            .nav-menu {
                display: none;
                position: fixed;
                top: var(--header-height);
                left: 0;
                right: 0;
                background: var(--black-primary);
                flex-direction: column;
                padding: 30px;
                border-bottom: 1px solid var(--gold-primary);
                z-index: 999;
            }
            
            .nav-menu.active {
                display: flex;
            }
            
            .mobile-menu-btn {
                display: block;
            }
            
            .login-card {
                padding: 30px 24px;
            }
        }
    </style>
</head>
<body>
    
    <!-- ============================================ -->
    <!-- HEADER (Consistent with homepage)             -->
    <!-- ============================================ -->
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <div class="logo-icon">💎</div>
                <div class="logo-text">
                    <div class="logo-main">LOVELY BEAUTY</div>
                    <div class="logo-sub">EST 1998 G.C.</div>
                </div>
            </a>
            
            <nav class="nav-menu" id="navMenu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="courses.html" class="nav-link">Courses</a>
                <a href="student-login.html" class="nav-link active">Student Portal</a>
                <a href="register.html" class="nav-link">Register</a>
                <a href="contact.html" class="nav-link">Contact</a>
            </nav>
            
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        </div>
    </header>
    
    <!-- ============================================ -->
    <!-- LOGIN FORM                                    -->
    <!-- ============================================ -->
    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <h2>Student Portal</h2>
                    <p>Login to access your courses</p>
                </div>
                
                <div class="error-msg" id="errorMsg"></div>
                
                <form id="loginForm">
                    <div class="input-group">
                        <label>Email or Student ID</label>
                        <input type="text" id="username" placeholder="student@lovely.com" value="student@lovely.com" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="••••••••" value="lovely2024" required>
                    </div>
                    <button type="submit" class="login-btn">Login to Portal</button>
                </form>
                
                <div class="demo-box">
                    <p>📝 Demo Credentials</p>
                    <code>student@lovely.com / lovely2024</code>
                </div>
                
                <div class="register-link">
                    Don't have an account? <a href="register.html">Register here</a>
                </div>
                
                <div class="back-link">
                    <a href="index.html">← Back to Homepage</a>
                </div>
            </div>
        </div>
    </div>
    
    <!-- ============================================ -->
    <!-- JAVASCRIPT                                    -->
    <!-- ============================================ -->
    <script>
        // ============================================
        // MOBILE MENU TOGGLE
        // ============================================
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const navMenu = document.getElementById('navMenu');
        
        if (mobileMenuBtn) {
            mobileMenuBtn.addEventListener('click', () => {
                navMenu.classList.toggle('active');
                mobileMenuBtn.textContent = navMenu.classList.contains('active') ? '✕' : '☰';
            });
        }
        
        // Close menu when clicking a link
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('active');
                if (mobileMenuBtn) mobileMenuBtn.textContent = '☰';
            });
        });
        
        // ============================================
        // LOGIN FUNCTIONALITY
        // ============================================
        const DEMO = { username: 'student@lovely.com', password: 'lovely2024' };
        
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            if (username === DEMO.username && password === DEMO.password) {
                localStorage.setItem('lovelyAuth', JSON.stringify({
                    name: 'Helen Tesfaye',
                    studentId: 'LBC-2024-001',
                    loggedIn: true
                }));
                
                // Show success message
                errorMsg.classList.remove('show');
                errorMsg.classList.add('success');
                errorMsg.textContent = '✓ Login successful! Redirecting...';
                errorMsg.classList.add('show');
                
                // Redirect after short delay
                setTimeout(() => {
                    window.location.href = 'student-dashboard.html';
                }, 500);
            } else {
                errorMsg.classList.remove('success');
                errorMsg.textContent = 'Invalid credentials. Use the demo credentials below.';
                errorMsg.classList.add('show');
            }
        });
        
        // Clear error on input
        ['username', 'password'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                document.getElementById('errorMsg').classList.remove('show');
            });
        });
        
        // ============================================
        // STICKY HEADER SHADOW
        // ============================================
        window.addEventListener('scroll', () => {
            const header = document.querySelector('.header');
            if (window.scrollY > 50) {
                header.style.boxShadow = '0 4px 30px rgba(0, 0, 0, 0.6)';
            } else {
                header.style.boxShadow = '0 4px 20px rgba(0, 0, 0, 0.5)';
            }
        });
        
        console.log('✅ Student Login Page Loaded');
    </script>
</body>
</html>
