<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | Lovely Plus Beauty College</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #0A0A0A;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-box {
            background: #1A1A1A;
            border: 2px solid #D4AF37;
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.15);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 36px;
        }
        
        .logo h1 {
            font-family: 'Playfair Display', serif;
            color: #D4AF37;
            font-size: 28px;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }
        
        .logo p {
            color: #B0B0B0;
            font-size: 12px;
            letter-spacing: 2px;
        }
        
        h2 {
            color: #D4AF37;
            font-family: 'Playfair Display', serif;
            text-align: center;
            margin-bottom: 8px;
            font-size: 22px;
        }
        
        .subtitle {
            color: #B0B0B0;
            text-align: center;
            margin-bottom: 32px;
            font-size: 14px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            color: #D4AF37;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 500;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: #111111;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        }
        
        .input-group input::placeholder {
            color: #666;
        }
        
        .remember-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        
        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #B0B0B0;
            font-size: 13px;
        }
        
        .remember input {
            accent-color: #D4AF37;
            width: 16px;
            height: 16px;
        }
        
        .forgot {
            color: #D4AF37;
            font-size: 13px;
            text-decoration: none;
        }
        
        .forgot:hover {
            text-decoration: underline;
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #D4AF37, #996515);
            color: #0A0A0A;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
        }
        
        .register-link {
            text-align: center;
            margin-top: 24px;
            color: #B0B0B0;
            font-size: 14px;
        }
        
        .register-link a {
            color: #D4AF37;
            text-decoration: none;
            font-weight: 500;
        }
        
        .register-link a:hover {
            text-decoration: underline;
        }
        
        .demo-box {
            background: rgba(212, 175, 55, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            padding: 16px;
            margin-top: 24px;
            text-align: center;
        }
        
        .demo-box p {
            color: #D4AF37;
            font-size: 12px;
            margin-bottom: 6px;
        }
        
        .demo-box code {
            background: #0A0A0A;
            padding: 6px 12px;
            border-radius: 6px;
            color: #F5D76E;
            font-family: monospace;
            font-size: 13px;
        }
        
        .back-home {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-home a {
            color: #666;
            text-decoration: none;
            font-size: 13px;
        }
        
        .back-home a:hover {
            color: #D4AF37;
        }
        
        .error-msg {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid #dc3545;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
            color: #dc3545;
            font-size: 13px;
            display: none;
        }
        
        .error-msg.show {
            display: block;
        }
        
        .lang-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            background: transparent;
            border: 1px solid #D4AF37;
            color: #D4AF37;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .lang-switch:hover {
            background: #D4AF37;
            color: #0A0A0A;
        }
    </style>
</head>
<body>
    
    <button class="lang-switch" id="langSwitch">አማ / EN</button>
    
    <div class="login-box">
        <div class="logo">
            <h1>LOVELY BEAUTY</h1>
            <p>EST 1998 G.C.</p>
        </div>
        
        <h2 data-en="Student Portal" data-am="የተማሪ ፖርታል">Student Portal</h2>
        <p class="subtitle" data-en="Login to access your courses" data-am="ኮርሶችዎን ለመድረስ ይግቡ">Login to access your courses</p>
        
        <div class="error-msg" id="errorMsg"></div>
        
        <form id="loginForm">
            <div class="input-group">
                <label data-en="Email or Student ID" data-am="ኢሜይል ወይም የተማሪ መታወቂያ">Email or Student ID</label>
                <input type="text" id="username" placeholder="student@lovely.com" required>
            </div>
            
            <div class="input-group">
                <label data-en="Password" data-am="የይለፍ ቃል">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <div class="remember-row">
                <label class="remember">
                    <input type="checkbox" id="rememberMe">
                    <span data-en="Remember me" data-am="አስታውሰኝ">Remember me</span>
                </label>
                <a href="#" class="forgot" data-en="Forgot password?" data-am="የይለፍ ቃል ረሳሁ?">Forgot password?</a>
            </div>
            
            <button type="submit" class="login-btn" data-en="Login to Portal" data-am="ወደ ፖርታል ይግቡ">Login to Portal</button>
        </form>
        
        <div class="register-link">
            <span data-en="Don't have an account?" data-am="መለያ የሎትም?">Don't have an account?</span>
            <a href="register.html" data-en="Register here" data-am="እዚህ ይመዝገቡ">Register here</a>
        </div>
        
        <div class="demo-box">
            <p data-en="📝 Demo Credentials" data-am="📝 የማሳያ መለያ">📝 Demo Credentials</p>
            <code>student@lovely.com / lovely2024</code>
        </div>
        
        <div class="back-home">
            <a href="index.html">← <span data-en="Back to Homepage" data-am="ወደ መነሻ ገፅ ተመለስ">Back to Homepage</span></a>
        </div>
    </div>
    
    <script>
        // Language Toggle
        let currentLang = localStorage.getItem('lang') || 'en';
        
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            
            document.querySelectorAll('[data-en][data-am]').forEach(el => {
                el.textContent = el.getAttribute(`data-${lang}`);
            });
            
            document.getElementById('langSwitch').textContent = lang === 'en' ? 'አማ / EN' : 'EN / አማ';
            document.getElementById('username').placeholder = 'student@lovely.com';
        }
        
        document.getElementById('langSwitch').addEventListener('click', () => {
            setLanguage(currentLang === 'en' ? 'am' : 'en');
        });
        
        setLanguage(currentLang);
        
        // Login Functionality
        const DEMO = {
            username: 'student@lovely.com',
            password: 'lovely2024'
        };
        
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('rememberMe').checked;
            const errorMsg = document.getElementById('errorMsg');
            
            if (username === DEMO.username && password === DEMO.password) {
                const authData = {
                    name: 'Helen Tesfaye',
                    studentId: 'LBC-2024-001',
                    loggedIn: true,
                    time: new Date().toISOString()
                };
                
                if (remember) {
                    localStorage.setItem('studentAuth', JSON.stringify(authData));
                } else {
                    sessionStorage.setItem('studentAuth', JSON.stringify(authData));
                }
                
                // Try dashboard in both locations
                const dashboardPaths = [
                    'student-portal/dashboard.html',
                    'student-portal/dashboard',
                    './student-portal/dashboard.html'
                ];
                
                // Simple redirect - will work if dashboard exists
                window.location.href = 'student-portal/dashboard.html';
                
            } else {
                errorMsg.classList.add('show');
                errorMsg.textContent = currentLang === 'en' 
                    ? 'Invalid username or password. Try the demo credentials below.' 
                    : 'የተሳሳተ የተጠቃሚ ስም ወይም የይለፍ ቃል። ከታች ያለውን የማሳያ መለያ ይሞክሩ።';
            }
        });
        
        // Clear error on input
        ['username', 'password'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                document.getElementById('errorMsg').classList.remove('show');
            });
        });
        
        // Auto-redirect if already logged in
        const auth = localStorage.getItem('studentAuth') || sessionStorage.getItem('studentAuth');
        if (auth) {
            try {
                const data = JSON.parse(auth);
                if (data.loggedIn) {
                    window.location.href = 'student-portal/dashboard.html';
                }
            } catch (e) {}
        }
        
        console.log('✅ Login page ready');
        console.log('📝 Demo: student@lovely.com / lovely2024');
    </script>
</body>
</html>
