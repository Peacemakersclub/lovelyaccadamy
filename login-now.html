<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        body { background: #0A0A0A; color: white; font-family: Arial; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 20px; }
        .card { background: #1A1A1A; border: 2px solid #D4AF37; border-radius: 20px; padding: 30px; max-width: 400px; width: 100%; }
        h1 { color: #D4AF37; text-align: center; margin-bottom: 10px; }
        h2 { color: #D4AF37; text-align: center; margin-bottom: 30px; font-size: 18px; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: black; border: 1px solid #D4AF37; color: white; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #D4AF37; color: black; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .error { color: #f44336; margin-top: 15px; text-align: center; }
        .success { color: #4CAF50; margin-top: 15px; text-align: center; }
        .hint { color: #666; text-align: center; margin-top: 20px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎓 Lovely Beauty College</h1>
        <h2>Student Portal Login</h2>
        
        <input type="text" id="studentId" placeholder="Student ID" value="LBC-001">
        <input type="password" id="pin" placeholder="PIN (enter 1234)" value="1234">
        <button onclick="login()">LOGIN TO DASHBOARD</button>
        <div id="message"></div>
        <div class="hint">
            ✅ Student found in database!<br>
            Use Student ID: <strong>LBC-001</strong><br>
            PIN: <strong>1234</strong>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://pmdrwwaztyfffnkrvwkq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtZHJ3d2F6dHlmZmZua3J2d2txIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODAzNzYsImV4cCI6MjA5MTY1NjM3Nn0.IKQ1eevZaO6uluDUU8PaqrD4uuQNy_Ex61n_dD2Qa8g';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function login() {
            const studentId = document.getElementById('studentId').value.trim().toUpperCase();
            const pin = document.getElementById('pin').value;
            const msg = document.getElementById('message');
            
            msg.className = '';
            msg.textContent = '';
            
            if (!studentId) {
                msg.className = 'error';
                msg.textContent = 'Please enter Student ID';
                return;
            }
            
            if (pin !== '1234') {
                msg.className = 'error';
                msg.textContent = 'PIN must be 1234';
                return;
            }
            
            msg.textContent = '🔍 Searching database...';
            msg.style.color = '#D4AF37';
            
            const { data: student, error } = await supabase
                .from('students')
                .select('*')
                .eq('student_id', studentId)
                .single();
            
            if (error || !student) {
                msg.className = 'error';
                msg.textContent = '❌ Student not found: ' + studentId;
                return;
            }
            
            msg.className = 'success';
            msg.innerHTML = '✅ STUDENT FOUND!<br><strong>' + student.full_name + '</strong><br>Redirecting to dashboard...';
            
            sessionStorage.setItem('currentStudent', JSON.stringify(student));
            
            setTimeout(() => {
                window.location.href = 'student-dashboard.html';
            }, 1500);
        }
        
        // Check if dashboard exists
        window.onload = function() {
            console.log('Login page ready. Student in database: LBC-001');
        };
    </script>
</body>
</html>
