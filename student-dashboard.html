<script>
document.addEventListener("DOMContentLoaded", () => {

    // 🔐 YOUR SUPABASE CONFIG
    const SUPABASE_URL = 'https://pmdrwwaztyfffnkrvwkq.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // keep your real key

    if (!window.supabase) {
        alert("Supabase not loaded!");
        return;
    }

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // =========================
    // 🔐 AUTH CHECK
    // =========================
    async function getUser() {
        const { data, error } = await supabase.auth.getSession();

        if (error || !data.session) {
            window.location.href = "student-login.html";
            return null;
        }

        return data.session.user;
    }

    // =========================
    // 👤 GET OR CREATE PROFILE
    // =========================
    async function getProfile(user) {
        try {
            let { data, error } = await supabase
                .from("students")
                .select("*")
                .eq("email", user.email);

            if (error) throw error;

            if (data.length > 0) return data[0];

            // 👉 create new student
            const newStudent = {
                email: user.email,
                full_name: user.user_metadata?.full_name || user.email.split("@")[0],
                student_id: "LBC-" + Date.now().toString().slice(-6),
                enrollment_date: new Date().toISOString().split("T")[0]
            };

            let { data: created, error: createError } = await supabase
                .from("students")
                .insert([newStudent])
                .select();

            if (createError) throw createError;

            return created[0];

        } catch (err) {
            console.error("Profile error:", err);
            return null;
        }
    }

    // =========================
    // 🎓 LOAD DASHBOARD
    // =========================
    async function loadDashboard() {
        const user = await getUser();
        if (!user) return;

        const profile = await getProfile(user);

        const name = profile?.full_name || user.email.split("@")[0];
        const firstName = name.split(" ")[0];

        // UI update
        document.getElementById("displayName").textContent = firstName;
        document.getElementById("sidebarStudentName").textContent = name;
        document.getElementById("sidebarStudentId").textContent = profile?.student_id || "N/A";

        const initials = name.split(" ").map(n => n[0]).join("").toUpperCase();
        document.getElementById("studentInitials").textContent = initials;

        // load courses
        if (profile?.id) {
            loadCourses(profile.id);
        } else {
            showEmpty();
        }
    }

    // =========================
    // 📚 LOAD COURSES
    // =========================
    async function loadCourses(studentId) {
        try {
            const { data, error } = await supabase
                .from("enrollments")
                .select("*, courses(*)")
                .eq("student_id", studentId);

            if (error) throw error;

            if (!data || data.length === 0) {
                showEmpty();
                return;
            }

            document.getElementById("activeCourses").textContent = data.length;

            let html = "";
            data.forEach(e => {
                const course = e.courses;
                const progress = e.progress || 0;

                html += `
                    <div class="course-item">
                        <div class="course-icon">📚</div>
                        <div class="course-info">
                            <h4>${course?.title || "Course"}</h4>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width:${progress}%"></div>
                            </div>
                            <p style="font-size:12px;color:#999;">${progress}% complete</p>
                        </div>
                    </div>
                `;
            });

            document.getElementById("coursesList").innerHTML = html;

            document.getElementById("activityList").innerHTML =
                `<div class="empty-state">Courses loaded successfully</div>`;

        } catch (err) {
            console.error(err);
            showEmpty("Failed to load courses");
        }
    }

    // =========================
    // 📭 EMPTY STATE
    // =========================
    function showEmpty(msg = "No courses yet") {
        document.getElementById("coursesList").innerHTML =
            `<div class="empty-state">${msg}</div>`;
        document.getElementById("activityList").innerHTML =
            `<div class="empty-state">No activity</div>`;
        document.getElementById("activeCourses").textContent = "0";
    }

    // =========================
    // 🚪 LOGOUT
    // =========================
    document.getElementById("logoutBtn").addEventListener("click", async () => {
        await supabase.auth.signOut();
        window.location.href = "student-login.html";
    });

    // =========================
    // 📱 MOBILE MENU
    // =========================
    const btn = document.getElementById("mobileMenuBtn");
    const nav = document.getElementById("navMenu");

    if (btn) {
        btn.addEventListener("click", () => {
            nav.classList.toggle("active");
            btn.textContent = nav.classList.contains("active") ? "✕" : "☰";
        });
    }

    // 🚀 START
    loadDashboard();

});
</script>
