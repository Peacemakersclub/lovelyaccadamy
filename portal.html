<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | Lovely Beauty College</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #0A0A0A; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        #loginScreen, #dashboardScreen { max-width: 500px; width: 100%; }
        #dashboardScreen { display: none; }
        
        .card { background: #1A1A1A; border: 2px solid #D4AF37; border-radius: 24px; padding: 35px 25px; text-align: center; }
        h1 { color: #D4AF37; font-family: 'Playfair Display', serif; font-size: 26px; margin-bottom: 8px; }
        h2 { color: #D4AF37; font-size: 16px; margin-bottom: 25px; font-weight: 400; }
        
        input { width: 100%; padding: 14px; margin: 8px 0; background: black; border: 1px solid #D4AF37; color: white; border-radius: 12px; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #D4AF37; color: black; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:disabled { opacity: 0.6; }
        
        .message { margin-top: 15px; font-weight: bold; min-height: 24px; }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        .info { color: #2196F3; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #D4AF37; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .student-header { display: flex; align-items: center; margin-bottom: 20px; }
        .avatar { width: 60px; height: 60px; background: #D4AF37; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; color: black; margin-right: 15px; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; text-align: left; }
        .info-item { background: #0A0A0A; padding: 12px; border-radius: 10px; }
        .info-item strong { color: #D4AF37; display: block; margin-bottom: 4px; font-size: 12px; }
        
        .course-item { display: flex; align-items: center; padding: 12px; background: #0A0A0A; border-radius: 12px; margin-bottom: 10px; text-align: left; }
        .course-icon { width: 45px; height: 45px; background: #D4AF37; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-right: 12px; color: black; }
        .progress-bar { height: 5px; background: #333; border-radius: 3px; margin-top: 6px; }
        .progress-fill { height: 100%; background: #D4AF37; border-radius: 3px; }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="loginScreen">
        <div class="card">
            <h1>🎓 LOVELY BEAUTY</h1>
            <h2>Student Portal</h2>
            
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()" id="loginBtn">🔐 LOGIN</button>
            <div id="loginMsg" class="message"></div>
            <p style="color:#666; margin-top:20px; font-size:13px;">
                <a href="register.html" style="color:#D4AF37;">📝 Register New Account</a><br>
                <a href="index.html" style="color:#666;">← Back to Home</a>
            </p>
        </div>
    </div>
    
    <!-- DASHBOARD SCREEN -->
    <div id="dashboardScreen">
        <div class="card">
            <div class="header">
                <h1 style="margin:0; font-size:20px;">🎓 LOVELY BEAUTY</h1>
                <button class="logout-btn" onclick="logout()" style="width:auto;">🚪 Logout</button>
            </div>
            
            <div class="student-header">
                <div class="avatar" id="initials">ST</div>
                <div style="text-align:left;">
                    <h2 id="dashName" style="margin:0;">Student</h2>
                    <p style="color:#D4AF37;" id="dashId">ID: --</p>
                </div>
            </div>
            
            <div class="info-grid">
                <div class="info-item"><strong>Email</strong> <span id="dashEmail">-</span></div>
                <div class="info-item"><strong>Phone</strong> <span id="dashPhone">-</span></div>
                <div class="info-item"><strong>Enrolled</strong> <span id="dashDate">-</span></div>
                <div class="info-item"><strong>Status</strong> ✅ Active</div>
            </div>
            
            <h3 style="color:#D4AF37; margin:20px 0 15px; text-align:left;">📚 My Courses</h3>
            <div id="coursesContainer"></div>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
          apiKey: "AIzaSyCn5PGyIgPobaL8WE4E89dFQwcjsx9Pcqs",
          authDomain: "lovely-beauty-college.firebaseapp.com",
          projectId: "lovely-beauty-college",
          storageBucket: "lovely-beauty-college.firebasestorage.app",
          messagingSenderId: "283710330376",
          appId: "1:283710330376:web:d34276a5918500b020e3bd"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        const emojis = {
            'Hairdressing': '💇', 'Makeup': '💄', 'Nails': '💅',
            'Skincare': '🧖', 'Eyelash': '👁️', 'Massage': '💆'
        };
        
        function getEmoji(name) {
            if (!name) return '📚';
            for (const [key, emoji] of Object.entries(emojis)) {
                if (name.includes(key)) return emoji;
            }
            return '📚';
        }
        
        // Check if already logged in
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = await db.collection('students').doc(user.uid).get();
                if (doc.exists) {
                    showDashboard({ id: user.uid, ...doc.data() });
                }
            }
        });
        
        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const msg = document.getElementById('loginMsg');
            const loginBtn = document.getElementById('loginBtn');
            
            msg.className = 'message';
            msg.textContent = '';
            
            if (!email || !password) {
                msg.className = 'message error';
                msg.textContent = 'Enter email and password';
                return;
            }
            
            loginBtn.disabled = true;
            msg.className = 'message info';
            msg.textContent = 'Logging in...';
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                const doc = await db.collection('students').doc(user.uid).get();
                
                if (doc.exists) {
                    const studentData = doc.data();
                    msg.className = 'message success';
                    msg.textContent = '✅ Welcome, ' + studentData.full_name + '!';
                    showDashboard({ id: user.uid, ...studentData });
                } else {
                    msg.className = 'message error';
                    msg.textContent = 'Student record not found. Please contact admin.';
                }
                
            } catch (error) {
                msg.className = 'message error';
                if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    msg.textContent = 'Invalid email or password';
                } else if (error.code === 'auth/invalid-email') {
                    msg.textContent = 'Invalid email format';
                } else {
                    msg.textContent = 'Error: ' + error.message;
                }
            } finally {
                loginBtn.disabled = false;
            }
        }
        
        function showDashboard(student) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboardScreen').style.display = 'block';
            
            document.getElementById('dashName').textContent = student.full_name;
            document.getElementById('dashId').textContent = 'ID: ' + student.student_id;
            document.getElementById('dashEmail').textContent = student.email;
            document.getElementById('dashPhone').textContent = student.phone || 'N/A';
            document.getElementById('dashDate').textContent = student.enrollment_date || 'N/A';
            
            const initials = student.full_name.split(' ').map(n => n[0]).join('').toUpperCase();
            document.getElementById('initials').textContent = initials;
            
            const container = document.getElementById('coursesContainer');
            container.innerHTML = '';
            
            if (student.courses && student.courses.length > 0) {
                student.courses.forEach(course => {
                    const progress = student.progress?.[course] || 0;
                    const div = document.createElement('div');
                    div.className = 'course-item';
                    div.innerHTML = `
                        <div class="course-icon">${getEmoji(course)}</div>
                        <div style="flex:1;">
                            <strong>${course}</strong>
                            <div class="progress-bar"><div class="progress-fill" style="width:${progress}%;"></div></div>
                            <small style="color:#aaa;">${progress}% Complete</small>
                        </div>
                    `;
                    container.appendChild(div);
                });
            } else {
                container.innerHTML = '<p style="color:#aaa; text-align:center;">No courses yet</p>';
            }
        }
        
        function logout() {
            auth.signOut();
            document.getElementById('dashboardScreen').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('loginMsg').textContent = '';
        }
    </script>
</body>
</html>
