<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        body { background: #0A0A0A; color: white; font-family: Arial; padding: 20px; text-align: center; }
        input { display: block; width: 90%; padding: 15px; margin: 10px auto; background: black; border: 1px solid #D4AF37; color: white; border-radius: 10px; font-size: 16px; }
        button { display: block; width: 90%; padding: 15px; margin: 20px auto; background: #D4AF37; color: black; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #msg { margin-top: 20px; }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
    </style>
</head>
<body>
    <h2 style="color:#D4AF37;">Student Portal</h2>
    
    <input type="text" id="studentId" placeholder="Student ID" value="LBC-001">
    <input type="password" id="pin" placeholder="PIN" value="1234">
    
    <button onclick="doLogin()">LOGIN</button>
    
    <div id="msg"></div>

    <script>
        const SUPABASE_URL = 'https://crsenpmonzoeverlpemb.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNyc2VucG1vbnpvZXZlcmxwZW1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NDMxMjQsImV4cCI6MjA5MjUxOTEyNH0.GFRmFJPwDXUtYCW3Cla93VdQg9ga1WhScLGvgaoPbxU';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function doLogin() {
            const msg = document.getElementById('msg');
            const studentId = document.getElementById('studentId').value;
            const pin = document.getElementById('pin').value;
            
            msg.textContent = 'Testing...';
            
            if (pin !== '1234') {
                msg.className = 'error';
                msg.textContent = 'Wrong PIN';
                return;
            }
            
            try {
                const { data, error } = await supabase
                    .from('students')
                    .select('*')
                    .eq('student_id', studentId)
                    .single();
                
                if (error) {
                    msg.className = 'error';
                    msg.textContent = 'Error: ' + error.message;
                    return;
                }
                
                if (data) {
                    msg.className = 'success';
                    msg.textContent = 'Found: ' + data.full_name;
                } else {
                    msg.className = 'error';
                    msg.textContent = 'Not found';
                }
            } catch (e) {
                msg.className = 'error';
                msg.textContent = 'Error: ' + e.message;
            }
        }
    </script>
</body>
</html>
