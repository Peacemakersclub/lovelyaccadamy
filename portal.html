<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | Lovely Beauty College</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        /* Clean, simple styling */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0A0A0A; color: white; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { background: #1A1A1A; padding: 40px; border-radius: 24px; border: 2px solid #D4AF37; max-width: 450px; width: 100%; box-shadow: 0 0 30px rgba(212, 175, 55, 0.1); text-align: center; }
        h1 { color: #D4AF37; margin-bottom: 10px; }
        p { color: #B0B0B0; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; color: #D4AF37; margin-bottom: 8px; font-weight: bold; }
        input { width: 100%; padding: 14px; background: black; border: 1px solid #D4AF37; color: white; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        button { background: #D4AF37; color: black; border: none; width: 100%; padding: 16px; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; transition: all 0.2s; margin-top: 15px; }
        button:hover { background: #F5D76E; }
        #message { margin-top: 20px; font-weight: bold; min-height: 24px; }
        .success { color: #4CAF50; }
        .error { color: #dc3545; }
        .demo-hint { background: #222; padding: 12px; border-radius: 12px; margin-bottom: 25px; font-size: 14px; border-left: 4px solid #D4AF37; }
        .demo-hint code { background: black; padding: 2px 6px; border-radius: 4px; color: #D4AF37; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 Student Portal</h1>
        <p>Lovely Beauty College</p>
        
        <div class="demo-hint">
            <strong>🔑 Test Credentials</strong><br>
            Student ID: <code>LBC-001</code><br>
            PIN: <code>1234</code> (demo unlock)
        </div>

        <div class="form-group">
            <label>Student ID</label>
            <input type="text" id="studentId" placeholder="e.g., LBC-001" value="LBC-001">
        </div>
        <div class="form-group">
            <label>Security PIN</label>
            <input type="password" id="pin" placeholder="Enter PIN" value="1234">
        </div>
        
        <button onclick="login()">Access My Dashboard</button>
        <div id="message"></div>
    </div>

    <script>
        // --- REAL CONFIGURATION ---
        const SUPABASE_URL = 'https://pmdrwwaztyfffnkrvwkq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtZHJ3d2F6dHlmZmZua3J2d2txIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODAzNzYsImV4cCI6MjA5MTY1NjM3Nn0.IKQ1eevZaO6uluDUU8PaqrD4uuQNy_Ex61n_dD2Qa8g';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function login() {
            const studentId = document.getElementById('studentId').value.trim().toUpperCase();
            const pin = document.getElementById('pin').value;
            const msgDiv = document.getElementById('message');
            
            // Reset message
            msgDiv.textContent = '';
            msgDiv.className = '';

            // 1. Demo PIN Check (You can replace this logic later)
            if (pin !== '1234') {
                msgDiv.textContent = 'Incorrect PIN (Demo PIN: 1234)';
                msgDiv.className = 'error';
                return;
            }

            msgDiv.textContent = 'Connecting to database...';
            msgDiv.className = 'success';

            try {
                // 2. REAL DATABASE QUERY
                const { data: student, error } = await supabase
                    .from('students')
                    .select('*')
                    .eq('student_id', studentId)
                    .single();

                if (error) {
                    console.error('Supabase error:', error);
                    msgDiv.textContent = 'Database error. Please check console.';
                    msgDiv.className = 'error';
                    return;
                }

                if (!student) {
                    msgDiv.textContent = 'Student ID not found.';
                    msgDiv.className = 'error';
                    return;
                }

                // 3. SUCCESS! Save to session and redirect
                msgDiv.textContent = `Welcome, ${student.full_name}! Redirecting...`;
                sessionStorage.setItem('currentStudent', JSON.stringify(student));
                
                // Redirect to a dedicated dashboard page or show inline (redirect is cleaner)
                window.location.href = 'student-dashboard.html';
                
            } catch (err) {
                console.error('Unexpected error:', err);
                msgDiv.textContent = 'An unexpected error occurred.';
                msgDiv.className = 'error';
            }
        }
    </script>
</body>
</html>
