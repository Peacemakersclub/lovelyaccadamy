<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | Lovely Beauty College</title>
    <link rel="icon" href="logo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --black-primary: #0A0A0A; --black-card: #1A1A1A; --gold-primary: #D4AF37; --white: #FFFFFF; --gray-mid: #B0B0B0; --header-height: 80px; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0A0A0A 0%, #1A1A1A 100%); min-height: 100vh; color: var(--white); }
        .header { position: sticky; top: 0; z-index: 1000; background: var(--black-primary); border-bottom: 1px solid rgba(212, 175, 55, 0.2); box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .header-container { display: flex; align-items: center; justify-content: space-between; height: var(--header-height); max-width: 1280px; margin: 0 auto; padding: 0 24px; }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--gold-primary), #996515); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .logo-text { font-family: 'Playfair Display', serif; font-weight: 700; line-height: 1.2; }
        .logo-main { font-size: 22px; color: var(--gold-primary); letter-spacing: 2px; }
        .logo-sub { font-size: 11px; color: var(--gray-mid); letter-spacing: 1px; }
        .nav-menu { display: flex; align-items: center; gap: 32px; }
        .nav-link { font-weight: 500; font-size: 15px; color: var(--gray-mid); position: relative; padding: 8px 0; text-decoration: none; }
        .nav-link:hover { color: var(--gold-primary); }
        .nav-link.active { color: var(--gold-primary); }
        .nav-link.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: var(--gold-primary); }
        .mobile-menu-btn { display: none; background: transparent; border: none; color: var(--white); font-size: 28px; cursor: pointer; }
        .login-section { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - var(--header-height)); padding: 40px 20px; }
        .login-container { max-width: 450px; width: 100%; }
        .login-card { background: var(--black-card); border: 2px solid var(--gold-primary); border-radius: 24px; padding: 40px 32px; }
        .login-header { text-align: center; margin-bottom: 32px; }
        .login-header h2 { font-family: 'Playfair Display', serif; color: var(--gold-primary); font-size: 28px; margin-bottom: 8px; }
        .login-header p { color: var(--gray-mid); font-size: 14px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: var(--gold-primary); font-size: 13px; margin-bottom: 6px; }
        .input-group input { width: 100%; padding: 14px 16px; background: #0A0A0A; border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 12px; color: white; font-size: 15px; }
        .input-group input:focus { outline: none; border-color: var(--gold-primary); }
        .login-btn { width: 100%; padding: 15px; background: var(--gold-primary); color: #0A0A0A; border: none; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer; }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .register-link { text-align: center; color: var(--gray-mid); font-size: 14px; margin-top: 16px; }
        .register-link a { color: var(--gold-primary); text-decoration: none; }
        .status { padding: 12px; border-radius: 10px; margin-bottom: 16px; display: none; text-align: center; font-size: 14px; }
        .status.error { display: block; background: rgba(220, 53, 69, 0.15); border: 1px solid #dc3545; color: #dc3545; }
        .status.success { display: block; background: rgba(212, 175, 55, 0.15); border: 1px solid var(--gold-primary); color: var(--gold-primary); }
        .status.info { display: block; background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold-primary); color: var(--gold-primary); }
        @media (max-width: 768px) {
            .nav-menu { display: none; }
            .nav-menu.active { display: flex; position: fixed; top: var(--header-height); left: 0; right: 0; background: var(--black-primary); flex-direction: column; padding: 30px; }
            .mobile-menu-btn { display: block; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <div class="logo-icon">💎</div>
                <div class="logo-text"><div class="logo-main">LOVELY BEAUTY</div><div class="logo-sub">COLLEGE & TRAINING CENTER</div></div>
            </a>
            <nav class="nav-menu" id="navMenu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="courses.html" class="nav-link">Courses</a>
                <a href="student-login.html" class="nav-link active">Student Portal</a>
                <a href="register.html" class="nav-link">Register</a>
                <a href="contact.html" class="nav-link">Contact</a>
            </nav>
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        </div>
    </header>
    
    <section class="login-section">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header"><h2>Student Portal</h2><p>Login with your registered email</p></div>
                <div class="status" id="status"></div>
                <form id="loginForm">
                    <div class="input-group"><label>Email Address</label><input type="email" id="email" placeholder="student@example.com" required></div>
                    <div class="input-group"><label>Password</label><input type="password" id="password" placeholder="••••••••" required></div>
                    <button type="submit" class="login-btn" id="loginBtn">Login to Portal</button>
                </form>
                <div class="register-link">Don't have an account? <a href="register.html">Register here</a></div>
            </div>
        </div>
    </section>
    
    <script>
        const SUPABASE_URL = 'https://pmdrwwaztyfffnkrvwkq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtZHJ3d2F6dHlmZmZua3J2d2txIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODAzNzYsImV4cCI6MjA5MTY1NjM3Nn0.IKQ1eevZaO6uluDUU8PaqrD4uuQNy_Ex61n_dD2Qa8g';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) window.location.href = 'student-dashboard.html';
        }
        checkSession();
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const status = document.getElementById('status');
            const loginBtn = document.getElementById('loginBtn');
            
            status.className = 'status';
            if (!email || !password) { status.className = 'status error'; status.textContent = 'Please enter email and password.'; return; }
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            status.className = 'status info';
            status.textContent = 'Authenticating...';
            
            try {
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                status.className = 'status success';
                status.textContent = '✅ Login successful! Redirecting...';
                setTimeout(() => { window.location.href = 'student-dashboard.html'; }, 1000);
            } catch (error) {
                status.className = 'status error';
                status.textContent = 'Invalid email or password.';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login to Portal';
            }
        });
        
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const navMenu = document.getElementById('navMenu');
        if(mobileMenuBtn) {
            mobileMenuBtn.addEventListener('click', () => {
                navMenu.classList.toggle('active');
                mobileMenuBtn.textContent = navMenu.classList.contains('active') ? '✕' : '☰';
            });
        }
    </script>
</body>
</html>
