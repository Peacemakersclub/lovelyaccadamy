<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Lovely Beauty College</title>
    <link rel="icon" href="logo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #0A0A0A; color: white; padding: 40px 20px; min-height: 100vh; display: flex; align-items: center; }
        .container { max-width: 550px; margin: 0 auto; width: 100%; }
        .form-card { background: #1A1A1A; border: 2px solid #D4AF37; border-radius: 24px; padding: 40px 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        h1 { color: #D4AF37; font-family: 'Playfair Display', serif; text-align: center; margin-bottom: 8px; font-size: 28px; }
        .subtitle { color: #B0B0B0; text-align: center; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; color: #D4AF37; margin-bottom: 6px; font-size: 13px; font-weight: 500; }
        input, select { width: 100%; padding: 14px; background: #0A0A0A; border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 12px; color: white; font-size: 15px; }
        input:focus, select:focus { outline: none; border-color: #D4AF37; }
        .btn { width: 100%; padding: 15px; background: #D4AF37; color: #0A0A0A; border: none; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .status { margin-top: 20px; padding: 14px; border-radius: 12px; display: none; text-align: center; font-size: 14px; }
        .status.success { display: block; background: rgba(212, 175, 55, 0.15); border: 1px solid #D4AF37; color: #D4AF37; }
        .status.error { display: block; background: rgba(220, 53, 69, 0.15); border: 1px solid #dc3545; color: #dc3545; }
        .status.info { display: block; background: rgba(212, 175, 55, 0.1); border: 1px solid #D4AF37; color: #D4AF37; }
        .login-link { text-align: center; margin-top: 24px; color: #B0B0B0; font-size: 14px; }
        .login-link a { color: #D4AF37; text-decoration: none; }
        .back-link { text-align: center; margin-top: 16px; }
        .back-link a { color: #666; text-decoration: none; font-size: 13px; }
        .required { color: #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card">
            <h1>Student Registration</h1>
            <p class="subtitle">Create your student account</p>
            <div class="status" id="status"></div>
            <form id="registerForm">
                <div class="form-group"><label>Full Name <span class="required">*</span></label><input type="text" id="full_name" placeholder="Enter your full name" required></div>
                <div class="form-group"><label>Phone Number <span class="required">*</span></label><input type="tel" id="phone" placeholder="09xxxxxxxx" required></div>
                <div class="form-group"><label>Email Address <span class="required">*</span></label><input type="email" id="email" placeholder="your@email.com" required></div>
                <div class="form-group"><label>Password <span class="required">*</span></label><input type="password" id="password" placeholder="Minimum 6 characters" required minlength="6"></div>
                <div class="form-group"><label>Confirm Password <span class="required">*</span></label><input type="password" id="password_confirm" placeholder="Re-enter password" required></div>
                <div class="form-group"><label>Select Course (Optional)</label><select id="course"><option value="">-- Select a course --</option><option value="Hairdressing & Barbering">Hairdressing & Barbering</option><option value="Makeup Artistry">Makeup Artistry</option><option value="Nail Technology">Nail Technology</option><option value="Skincare & Aesthetics">Skincare & Aesthetics</option><option value="Eyelash & Brow Services">Eyelash & Brow Services</option><option value="Massage Therapy">Massage Therapy</option></select></div>
                <button type="submit" class="btn" id="submitBtn">Create Account</button>
            </form>
            <div class="login-link">Already have an account? <a href="student-login.html">Login here</a></div>
            <div class="back-link"><a href="index.html">← Back to Homepage</a></div>
        </div>
    </div>
    <script>
        // CORRECT SUPABASE CONFIGURATION
        const SUPABASE_URL = 'https://pmdrwwaztyfffnkrvwkq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtZHJ3d2F6dHlmZmZua3J2d2txIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODAzNzYsImV4cCI6MjA5MTY1NjM3Nn0.IKQ1eevZaO6uluDUU8PaqrD4uuQNy_Ex61n_dD2Qa8g';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const fullName = document.getElementById('full_name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password_confirm').value;
            const selectedCourse = document.getElementById('course').value;
            const status = document.getElementById('status');
            const submitBtn = document.getElementById('submitBtn');
            
            status.className = 'status';
            status.textContent = '';
            
            // Validation
            if (!fullName || !phone || !email || !password) {
                status.className = 'status error';
                status.textContent = 'Please fill in all required fields.';
                return;
            }
            if (password !== passwordConfirm) {
                status.className = 'status error';
                status.textContent = 'Passwords do not match.';
                return;
            }
            if (password.length < 6) {
                status.className = 'status error';
                status.textContent = 'Password must be at least 6 characters.';
                return;
            }
            
            const studentId = 'LBC-' + Date.now().toString().slice(-6);
            status.className = 'status info';
            status.textContent = 'Creating your account...';
            submitBtn.disabled = true;
            
            try {
                // Step 1: Create auth user
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: { data: { full_name: fullName } }
                });
                
                if (authError) {
                    if (authError.message.includes('already registered')) {
                        throw new Error('This email is already registered. Please login.');
                    }
                    throw authError;
                }
                
                console.log('Auth user created:', authData);
                
                // Step 2: Create student record
                const { data: studentData, error: studentError } = await supabase
                    .from('students')
                    .insert([{
                        email: email,
                        full_name: fullName,
                        phone: phone,
                        student_id: studentId,
                        enrollment_date: new Date().toISOString().split('T')[0]
                    }])
                    .select()
                    .single();
                
                if (studentError) {
                    console.error('Student insert error:', studentError);
                    // Even if student record fails, auth worked
                    status.className = 'status success';
                    status.innerHTML = `✅ Account created! Your Student ID: ${studentId}<br>⚠️ Please contact admin to complete profile.`;
                } else {
                    console.log('Student record created:', studentData);
                    
                    // Step 3: Create enrollment if course selected
                    if (selectedCourse && studentData) {
                        const { data: courseData } = await supabase
                            .from('courses')
                            .select('id')
                            .eq('title', selectedCourse)
                            .single();
                        
                        if (courseData) {
                            await supabase.from('enrollments').insert([{
                                student_id: studentData.id,
                                course_id: courseData.id,
                                enrollment_date: new Date().toISOString().split('T')[0],
                                progress: 0
                            }]);
                        }
                    }
                    
                    status.className = 'status success';
                    status.innerHTML = `✅ Registration successful! Your Student ID: ${studentId}<br>Redirecting to login...`;
                }
                
                document.getElementById('registerForm').reset();
                setTimeout(() => { window.location.href = 'student-login.html'; }, 3000);
                
            } catch (error) {
                console.error('Registration error:', error);
                status.className = 'status error';
                status.textContent = 'Error: ' + error.message;
            } finally {
                submitBtn.disabled = false;
            }
        });
        
        // Redirect if already logged in
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) window.location.href = 'student-dashboard.html';
        }
        checkSession();
    </script>
</body>
</html>
