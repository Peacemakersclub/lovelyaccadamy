<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Lovely Beauty College</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #0A0A0A; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #1A1A1A; border: 2px solid #D4AF37; border-radius: 24px; padding: 35px 30px; max-width: 500px; width: 100%; text-align: center; }
        h1 { color: #D4AF37; font-family: 'Playfair Display', serif; font-size: 26px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; background: black; border: 1px solid #D4AF37; color: white; border-radius: 12px; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #D4AF37; color: black; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:disabled { opacity: 0.6; }
        .message { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; }
        .success { display: block; background: #1a3a1a; color: #4CAF50; border: 1px solid #4CAF50; }
        .error { display: block; background: #3a1a1a; color: #f44336; border: 1px solid #f44336; }
        .info { display: block; background: #1a2a3a; color: #2196F3; border: 1px solid #2196F3; }
        a { color: #D4AF37; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎓 Student Registration</h1>
        <p style="color:#aaa; margin-bottom:20px;">Create your permanent student account</p>
        
        <div id="msg" class="message"></div>
        
        <form id="regForm">
            <input type="text" id="fullName" placeholder="Full Name *" required>
            <input type="email" id="email" placeholder="Email Address *" required>
            <input type="tel" id="phone" placeholder="Phone Number *" required>
            <input type="password" id="password" placeholder="Create Password (min 6 chars) *" required minlength="6">
            <input type="password" id="confirmPassword" placeholder="Confirm Password *" required>
            <select id="course">
                <option value="">Select Course *</option>
                <option>Hairdressing & Barbering</option>
                <option>Makeup Artistry</option>
                <option>Nail Technology</option>
                <option>Skincare & Aesthetics</option>
                <option>Eyelash & Brow Services</option>
                <option>Massage Therapy</option>
            </select>
            <button type="submit" id="submitBtn">Register Now</button>
        </form>
        
        <p style="margin-top:20px; color:#aaa;">
            Already registered? <a href="portal.html">Login here</a>
        </p>
        <p style="margin-top:10px;">
            <a href="index.html" style="font-size:13px;">← Back to Home</a>
        </p>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
          apiKey: "AIzaSyCn5PGyIgPobaL8WE4E89dFQwcjsx9Pcqs",
          authDomain: "lovely-beauty-college.firebaseapp.com",
          projectId: "lovely-beauty-college",
          storageBucket: "lovely-beauty-college.firebasestorage.app",
          messagingSenderId: "283710330376",
          appId: "1:283710330376:web:d34276a5918500b020e3bd"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        document.getElementById('regForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const msg = document.getElementById('msg');
            const submitBtn = document.getElementById('submitBtn');
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const course = document.getElementById('course').value;
            
            msg.className = 'message';
            
            if (!fullName || !email || !phone || !password || !course) {
                msg.className = 'message error';
                msg.textContent = '❌ Please fill all fields';
                return;
            }
            
            if (password !== confirmPassword) {
                msg.className = 'message error';
                msg.textContent = '❌ Passwords do not match';
                return;
            }
            
            if (password.length < 6) {
                msg.className = 'message error';
                msg.textContent = '❌ Password must be at least 6 characters';
                return;
            }
            
            submitBtn.disabled = true;
            msg.className = 'message info';
            msg.textContent = '⏳ Creating your account...';
            
            try {
                // Create Firebase Auth user
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Generate student ID
                const studentId = 'LBC-' + Date.now().toString().slice(-6);
                
                // Save to Firestore
                await db.collection('students').doc(user.uid).set({
                    full_name: fullName,
                    email: email,
                    phone: phone,
                    student_id: studentId,
                    enrollment_date: new Date().toISOString().split('T')[0],
                    courses: [course],
                    progress: { [course]: 0 },
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                msg.className = 'message success';
                msg.innerHTML = `
                    ✅ <strong>Registration Successful!</strong><br><br>
                    Your Student ID: <strong style="font-size:20px;">${studentId}</strong><br>
                    Email: <strong>${email}</strong><br><br>
                    ⚠️ Save these! You need them to log in.<br><br>
                    <a href="portal.html" style="color:#4CAF50;font-weight:bold;">→ Go to Student Portal</a>
                `;
                
                document.getElementById('regForm').reset();
                
            } catch (error) {
                msg.className = 'message error';
                if (error.code === 'auth/email-already-in-use') {
                    msg.textContent = '❌ This email is already registered. Please login.';
                } else {
                    msg.textContent = '❌ Error: ' + error.message;
                }
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
