<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Lovely Beauty College</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0A0A0A; color: white; padding: 20px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #1A1A1A; border: 2px solid #D4AF37; border-radius: 20px; padding: 30px; max-width: 450px; width: 100%; }
        h1 { color: #D4AF37; text-align: center; margin-bottom: 25px; font-size: 24px; }
        input, select { width: 100%; padding: 14px; margin-bottom: 15px; background: black; border: 1px solid #D4AF37; border-radius: 10px; color: white; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #D4AF37; color: black; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        button:disabled { opacity: 0.5; }
        .message { margin-top: 15px; padding: 12px; border-radius: 8px; display: none; }
        .success { display: block; background: #1a3a1a; color: #4CAF50; border: 1px solid #4CAF50; }
        .error { display: block; background: #3a1a1a; color: #f44336; border: 1px solid #f44336; }
        .info { display: block; background: #1a2a3a; color: #2196F3; border: 1px solid #2196F3; }
        .links { text-align: center; margin-top: 20px; }
        .links a { color: #D4AF37; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Student Registration</h1>
        
        <div id="message" class="message"></div>
        
        <form id="registerForm">
            <input type="text" id="fullName" placeholder="Full Name" required>
            <input type="tel" id="phone" placeholder="Phone (09xxxxxxxx)" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password (min 6 chars)" required>
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            <select id="course">
                <option value="">-- Select Course (Optional) --</option>
                <option value="Hairdressing & Barbering">Hairdressing & Barbering</option>
                <option value="Makeup Artistry">Makeup Artistry</option>
                <option value="Nail Technology">Nail Technology</option>
                <option value="Skincare & Aesthetics">Skincare & Aesthetics</option>
                <option value="Eyelash & Brow Services">Eyelash & Brow Services</option>
                <option value="Massage Therapy">Massage Therapy</option>
            </select>
            <button type="submit" id="submitBtn">Create Account</button>
        </form>
        
        <div class="links">
            <p>Already have an account? <a href="student-login.html">Login</a></p>
            <p><a href="index.html">← Back to Home</a></p>
        </div>
    </div>

    <script>
        // YOUR SUPABASE CONFIG
        const SUPABASE_URL = 'https://pmdrwwaztyfffnkrvwkq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtZHJ3d2F6dHlmZmZua3J2d2txIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODAzNzYsImV4cCI6MjA5MTY1NjM3Nn0.IKQ1eevZaO6uluDUU8PaqrD4uuQNy_Ex61n_dD2Qa8g';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const form = document.getElementById('registerForm');
        const msgDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const course = document.getElementById('course').value;
            
            // Reset message
            msgDiv.className = 'message';
            msgDiv.textContent = '';
            
            // Basic validation
            if (!fullName || !phone || !email || !password) {
                msgDiv.className = 'message error';
                msgDiv.textContent = 'Please fill all required fields';
                return;
            }
            
            if (password !== confirmPassword) {
                msgDiv.className = 'message error';
                msgDiv.textContent = 'Passwords do not match';
                return;
            }
            
            if (password.length < 6) {
                msgDiv.className = 'message error';
                msgDiv.textContent = 'Password must be at least 6 characters';
                return;
            }
            
            // Show loading
            msgDiv.className = 'message info';
            msgDiv.textContent = 'Creating account...';
            submitBtn.disabled = true;
            
            try {
                // STEP 1: Sign up with Supabase Auth
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: { full_name: fullName }
                    }
                });
                
                if (authError) {
                    if (authError.message.includes('already')) {
                        throw new Error('Email already registered. Please login.');
                    }
                    throw authError;
                }
                
                console.log('Auth success:', authData);
                
                // STEP 2: Insert into students table
                const studentId = 'LBC-' + Date.now().toString().slice(-6);
                
                const { error: dbError } = await supabase
                    .from('students')
                    .insert([{
                        email: email,
                        full_name: fullName,
                        phone: phone,
                        student_id: studentId,
                        enrollment_date: new Date().toISOString().split('T')[0]
                    }]);
                
                if (dbError) {
                    console.warn('Student record warning:', dbError);
                    // Continue anyway - auth worked
                }
                
                // STEP 3: If course selected, create enrollment
                if (course) {
                    const { data: courseData } = await supabase
                        .from('courses')
                        .select('id')
                        .eq('title', course)
                        .single();
                    
                    if (courseData) {
                        const { data: studentData } = await supabase
                            .from('students')
                            .select('id')
                            .eq('email', email)
                            .single();
                        
                        if (studentData) {
                            await supabase
                                .from('enrollments')
                                .insert([{
                                    student_id: studentData.id,
                                    course_id: courseData.id,
                                    enrollment_date: new Date().toISOString().split('T')[0],
                                    progress: 0
                                }]);
                        }
                    }
                }
                
                // SUCCESS!
                msgDiv.className = 'message success';
                msgDiv.innerHTML = `✅ Registration successful!<br>Student ID: ${studentId}<br>Redirecting to login...`;
                
                setTimeout(() => {
                    window.location.href = 'student-login.html';
                }, 3000);
                
            } catch (error) {
                console.error('Error:', error);
                msgDiv.className = 'message error';
                msgDiv.textContent = error.message;
                submitBtn.disabled = false;
            }
        });
        
        // Redirect if already logged in
        (async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) window.location.href = 'student-dashboard.html';
        })();
    </script>
</body>
</html>
