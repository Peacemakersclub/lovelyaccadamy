<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Lovely Beauty College</title>
    <link rel="icon" href="logo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #0A0A0A; color: white; padding: 40px 20px; }
        .container { max-width: 550px; margin: 0 auto; }
        .form-card { background: #1A1A1A; border: 2px solid #D4AF37; border-radius: 24px; padding: 40px 30px; }
        h1 { color: #D4AF37; font-family: 'Playfair Display', serif; text-align: center; margin-bottom: 8px; font-size: 28px; }
        .subtitle { color: #B0B0B0; text-align: center; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; color: #D4AF37; margin-bottom: 6px; font-size: 13px; font-weight: 500; }
        input, select { width: 100%; padding: 14px 16px; background: #0A0A0A; border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 12px; color: white; font-size: 15px; }
        input:focus, select:focus { outline: none; border-color: #D4AF37; box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2); }
        .btn { width: 100%; padding: 15px; background: #D4AF37; color: #0A0A0A; border: none; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn:hover { background: #F5D76E; }
        .status { margin-top: 20px; padding: 14px; border-radius: 12px; display: none; text-align: center; font-size: 14px; }
        .status.success { display: block; background: rgba(212, 175, 55, 0.15); border: 1px solid #D4AF37; color: #D4AF37; }
        .status.error { display: block; background: rgba(220, 53, 69, 0.15); border: 1px solid #dc3545; color: #dc3545; }
        .status.info { display: block; background: rgba(212, 175, 55, 0.1); border: 1px solid #D4AF37; color: #D4AF37; }
        .login-link { text-align: center; margin-top: 24px; color: #B0B0B0; font-size: 14px; }
        .login-link a { color: #D4AF37; text-decoration: none; }
        .back-link { text-align: center; margin-top: 16px; }
        .back-link a { color: #666; text-decoration: none; font-size: 13px; }
        .required { color: #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card">
            <h1>Student Registration</h1>
            <p class="subtitle">Create your student account</p>
            <div class="status" id="status"></div>
            <form id="registerForm">
                <div class="form-group"><label>Full Name <span class="required">*</span></label><input type="text" name="full_name" id="full_name" placeholder="Enter your full name" required></div>
                <div class="form-group"><label>Phone Number <span class="required">*</span></label><input type="tel" name="phone" id="phone" placeholder="09xxxxxxxx" required></div>
                <div class="form-group"><label>Email Address <span class="required">*</span></label><input type="email" name="email" id="email" placeholder="your@email.com" required></div>
                <div class="form-group"><label>Password <span class="required">*</span></label><input type="password" name="password" id="password" placeholder="Minimum 6 characters" required minlength="6"></div>
                <div class="form-group"><label>Confirm Password <span class="required">*</span></label><input type="password" name="password_confirm" id="password_confirm" placeholder="Re-enter password" required></div>
                <div class="form-group"><label>Select Course (Optional)</label><select name="course" id="course"><option value="">-- Select a course --</option><option value="Hairdressing">💇 Hairdressing & Barbering</option><option value="Makeup">💄 Makeup Artistry</option><option value="Nails">💅 Nail Technology</option><option value="Skincare">🧖 Skincare & Aesthetics</option></select></div>
                <button type="submit" class="btn" id="submitBtn">Create Account</button>
            </form>
            <div class="login-link">Already have an account? <a href="student-login.html">Login here</a></div>
            <div class="back-link"><a href="index.html">← Back to Homepage</a></div>
        </div>
    </div>
    <script>
        const SUPABASE_URL = 'https://d5gwP-ofTxVx2feA5AVM3A.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_d5gwP-ofTxVx2feA5AVM3A_EhQcHv8e';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const form = document.getElementById('registerForm');
        const status = document.getElementById('status');
        const submitBtn = document.getElementById('submitBtn');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('full_name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password_confirm').value;
            const course = document.getElementById('course').value;
            status.className = 'status'; status.textContent = '';
            if (!fullName || !phone || !email || !password) { status.className = 'status error'; status.textContent = '❌ Please fill in all required fields.'; return; }
            if (password !== passwordConfirm) { status.className = 'status error'; status.textContent = '❌ Passwords do not match.'; return; }
            if (password.length < 6) { status.className = 'status error'; status.textContent = '❌ Password must be at least 6 characters.'; return; }
            const studentId = 'LBC-' + Date.now().toString().slice(-6);
            status.className = 'status info'; status.textContent = '⏳ Creating your account...'; submitBtn.disabled = true; submitBtn.textContent = 'Creating Account...';
            try {
                const { data: authData, error: authError } = await supabase.auth.signUp({ email: email, password: password, options: { data: { full_name: fullName, phone: phone } } });
                if (authError) { if (authError.message.includes('already registered')) { throw new Error('This email is already registered.'); } throw authError; }
                if (!authData.user) throw new Error('Failed to create account.');
                const { error: profileError } = await supabase.from('students').insert([{ id: authData.user.id, full_name: fullName, phone: phone, email: email, student_id: studentId, course: course || null, enrollment_date: new Date().toISOString() }]);
                if (profileError) throw new Error('Profile setup failed.');
                status.className = 'status success'; status.textContent = `✅ Registration successful! Your Student ID: ${studentId}`; form.reset();
                setTimeout(() => { window.location.href = 'student-login.html'; }, 3000);
            } catch (error) { status.className = 'status error'; status.textContent = '❌ ' + error.message; }
            finally { submitBtn.disabled = false; submitBtn.textContent = 'Create Account'; }
        });
    </script>
</body>
</html>
