<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Lovely Beauty College</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #0A0A0A; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #1A1A1A; border: 2px solid #D4AF37; border-radius: 24px; padding: 35px 30px; max-width: 500px; width: 100%; text-align: center; }
        h1 { color: #D4AF37; font-family: 'Playfair Display', serif; font-size: 26px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; background: black; border: 1px solid #D4AF37; color: white; border-radius: 12px; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #D4AF37; color: black; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .message { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; }
        .success { display: block; background: #1a3a1a; color: #4CAF50; border: 1px solid #4CAF50; }
        .error { display: block; background: #3a1a1a; color: #f44336; border: 1px solid #f44336; }
        a { color: #D4AF37; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎓 Student Registration</h1>
        <p style="color:#aaa; margin-bottom:20px;">Create your student account</p>
        
        <div id="msg" class="message"></div>
        
        <form id="regForm">
            <input type="text" id="fullName" placeholder="Full Name *" required>
            <input type="email" id="email" placeholder="Email Address *" required>
            <input type="tel" id="phone" placeholder="Phone Number (09xxxxxxxx) *" required>
            <input type="password" id="password" placeholder="Create Password (min 4 chars) *" required minlength="4">
            <input type="password" id="confirmPassword" placeholder="Confirm Password *" required>
            <select id="course">
                <option value="">Select Course *</option>
                <option>Hairdressing & Barbering</option>
                <option>Makeup Artistry</option>
                <option>Nail Technology</option>
                <option>Skincare & Aesthetics</option>
                <option>Eyelash & Brow Services</option>
                <option>Massage Therapy</option>
            </select>
            <button type="submit">Register Now</button>
        </form>
        
        <p style="margin-top:20px; color:#aaa;">
            Already registered? <a href="portal.html">Login here</a>
        </p>
        <p style="margin-top:10px;">
            <a href="index.html" style="font-size:13px;">← Back to Home</a>
        </p>
    </div>

    <script>
        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const msg = document.getElementById('msg');
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const course = document.getElementById('course').value;
            
            // Reset message
            msg.className = 'message';
            
            // Validation
            if (!fullName || !email || !phone || !password || !course) {
                msg.className = 'message error';
                msg.textContent = '❌ Please fill all required fields';
                return;
            }
            
            if (password !== confirmPassword) {
                msg.className = 'message error';
                msg.textContent = '❌ Passwords do not match';
                return;
            }
            
            if (password.length < 4) {
                msg.className = 'message error';
                msg.textContent = '❌ Password must be at least 4 characters';
                return;
            }
            
            // Generate student ID
            const studentId = 'LBC-' + Date.now().toString().slice(-6);
            
            // Save registration to localStorage
            const studentData = {
                full_name: fullName,
                email: email,
                phone: phone,
                password: password,
                student_id: studentId,
                course: course,
                enrollment_date: new Date().toISOString().split('T')[0],
                courses: [course],
                progress: {}
            };
            studentData.progress[course] = 0;
            
            // Store in localStorage
            let registrations = JSON.parse(localStorage.getItem('lovelyRegistrations') || '[]');
            registrations.push(studentData);
            localStorage.setItem('lovelyRegistrations', JSON.stringify(registrations));
            
            // Show success
            msg.className = 'message success';
            msg.innerHTML = `
                ✅ <strong>Registration Successful!</strong><br><br>
                Your Student ID: <strong style="font-size:20px;color:#fff;">${studentId}</strong><br>
                Password: <strong>${password}</strong><br><br>
                <small>⚠️ Save these credentials! You need them to log in.</small><br><br>
                <a href="portal.html" style="color:#4CAF50;font-weight:bold;">Go to Student Portal →</a>
            `;
            
            document.getElementById('regForm').reset();
        });
    </script>
</body>
</html>
