<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
    const SUPABASE_URL = 'https://d5gwP-ofTxVx2feA5AVM3A.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_d5gwP-ofTxVx2feA5AVM3A_EhQcHv8e';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const form = document.getElementById('registrationForm');
    const status = document.getElementById('formStatus');
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Get form values
        const fullName = form.full_name.value;
        const phone = form.phone.value;
        const email = form.email.value;
        const password = form.password?.value || 'Student2024!'; // Add password field if not present
        
        // Generate student ID
        const studentId = 'LBC-' + Date.now().toString().slice(-6);
        
        status.className = 'form-status';
        status.textContent = 'Creating account...';
        status.style.display = 'block';
        status.style.background = 'rgba(212, 175, 55, 0.15)';
        status.style.color = '#D4AF37';
        
        try {
            // Create auth user
            const { data: authData, error: authError } = await supabase.auth.signUp({
                email: email,
                password: password
            });
            
            if (authError) throw authError;
            
            // Create student profile
            const { error: profileError } = await supabase
                .from('students')
                .insert([{
                    id: authData.user.id,
                    full_name: fullName,
                    phone: phone,
                    email: email,
                    student_id: studentId,
                    enrollment_date: new Date().toISOString()
                }]);
            
            if (profileError) throw profileError;
            
            status.style.background = 'rgba(212, 175, 55, 0.15)';
            status.style.color = '#D4AF37';
            status.textContent = '✓ Registration successful! You can now login.';
            form.reset();
            
            setTimeout(() => {
                window.location.href = 'student-login.html';
            }, 2000);
            
        } catch (error) {
            status.style.background = 'rgba(220, 53, 69, 0.15)';
            status.style.color = '#dc3545';
            status.textContent = 'Error: ' + error.message;
        }
    });
</script>
