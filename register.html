<script>
document.addEventListener("DOMContentLoaded", () => {

    const SUPABASE_URL = 'https://pmdrwwaztyfffnkrvwkq.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // keep full key

    // ✅ Check Supabase loaded
    if (!window.supabase) {
        alert("Supabase failed to load. Check internet.");
        return;
    }

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const status = document.getElementById('status');
    const loginBtn = document.getElementById('loginBtn');
    const form = document.getElementById('loginForm');

    // =========================
    // 🔐 CHECK SESSION
    // =========================
    async function checkSession() {
        try {
            const { data, error } = await supabase.auth.getSession();

            if (error) throw error;

            if (data.session) {
                window.location.href = 'student-dashboard.html';
            }
        } catch (err) {
            console.error("Session error:", err);
        }
    }

    checkSession();

    // =========================
    // 🔑 LOGIN
    // =========================
    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        status.className = 'status';

        if (!email || !password) {
            status.className = 'status error';
            status.textContent = 'Please enter email and password.';
            return;
        }

        loginBtn.disabled = true;
        loginBtn.textContent = 'Logging in...';

        status.className = 'status info';
        status.textContent = 'Authenticating...';

        try {
            const { data, error } = await supabase.auth.signInWithPassword({
                email,
                password
            });

            if (error) throw error;

            status.className = 'status success';
            status.textContent = '✅ Login successful! Redirecting...';

            setTimeout(() => {
                window.location.href = 'student-dashboard.html';
            }, 1000);

        } catch (err) {
            console.error("Login error:", err);

            status.className = 'status error';

            // 🔥 Better messages
            if (err.message.includes("Invalid login credentials")) {
                status.textContent = 'Invalid email or password.';
            } else if (err.message.includes("Email not confirmed")) {
                status.textContent = 'Please confirm your email first.';
            } else {
                status.textContent = 'Error: ' + err.message;
            }

            loginBtn.disabled = false;
            loginBtn.textContent = 'Login to Portal';
        }
    });

    // =========================
    // 📱 MOBILE MENU
    // =========================
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const navMenu = document.getElementById('navMenu');

    if (mobileMenuBtn) {
        mobileMenuBtn.addEventListener('click', () => {
            navMenu.classList.toggle('active');
            mobileMenuBtn.textContent =
                navMenu.classList.contains('active') ? '✕' : '☰';
        });
    }

});
</script>
