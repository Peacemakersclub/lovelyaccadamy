    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCn5PGyIgPobaL8WE4E89dFQwcjsx9Pcqs",
          authDomain: "lovely-beauty-college.firebaseapp.com",
          projectId: "lovely-beauty-college",
          storageBucket: "lovely-beauty-college.firebasestorage.app",
          messagingSenderId: "283710330376",
          appId: "1:283710330376:web:d34276a5918500b020e3bd"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // COMPREHENSIVE FAKE EMAIL DOMAIN LIST
        const blockedDomains = [
            'test.com', 'fake.com', 'email.com', 'mail.com', 'noemail.com', 'noreply.com',
            'mailinator.com', 'tempmail.com', 'guerrillamail.com', '10minutemail.com',
            'yopmail.com', 'throwaway.com', 'example.com', 'sample.com', 'demo.com',
            'test.org', 'fake.org', 'temp.com', 'trashmail.com', 'sharklasers.com',
            'grr.la', 'spam4.me', 'maildrop.cc', 'harakirimail.com', 'dispostable.com',
            'mailnesia.com', 'mailcatch.com', 'tempinbox.com', 'mintemail.com',
            'mytemp.email', 'emailondeck.com', 'spamgourmet.com', 'spamspot.com',
            'tempr.email', 'discard.email', 'abc.com', 'xyz.com', '123.com',
            'asd.com', 'qwe.com', 'zxc.com', 'iop.com', 'lkj.com', 'mnb.com',
            'poi.com', 'uytr.com', 'rewq.com', 'fdsa.com', 'nbvc.com', 'cxz.com',
            'mail.ru', 'inbox.ru', 'list.ru', 'bk.ru', 'internet.ru', 'yandex.com',
            'protonmail.com', 'tutanota.com', 'cock.li', 'airmail.net', 'getnada.com',
            'nada.email', 'guerrilla.email', 'temp-mail.org', 'moakt.com', 'fakeinbox.com',
            'throwaway.email', 'trash-mail.com', 'disposeamail.com', 'mailnull.com',
            'spambox.us', 'spamcero.com', 'spamdecoy.net', 'anonymbox.com', 'trashcanmail.com',
            'testmail.com', 'fakeemail.com', 'notreal.com', 'madeup.com', 'placeholder.com',
            'nobody.com', 'nowhere.com', 'nomail.com', 'dontemail.com', 'blackhole.com'
        ];
        
        function isFakeEmail(email) {
            if (!email || !email.includes('@')) return true;
            
            const parts = email.split('@');
            if (parts.length !== 2) return true;
            
            const localPart = parts[0];
            const domain = parts[1]?.toLowerCase();
            
            // Must have a dot in domain
            if (!domain || !domain.includes('.')) return true;
            
            // Check blocked domains
            if (blockedDomains.includes(domain)) return true;
            
            // Local part must be at least 3 characters
            if (localPart.length < 3) return true;
            
            // Cannot be only numbers
            if (/^\d+$/.test(localPart)) return true;
            
            // Cannot contain suspicious patterns
            if (localPart.includes('test') || localPart.includes('fake') || localPart.includes('spam') || localPart.includes('temp')) return true;
            
            // Cannot have too many dots or special chars
            if ((localPart.match(/\./g) || []).length > 3) return true;
            
            return false;
        }
        
        document.getElementById('regForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const msg = document.getElementById('msg'), btn = document.getElementById('submitBtn');
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const course = document.getElementById('course').value;
            
            msg.className = 'message'; msg.textContent = '';
            
            // Validation
            if (!fullName || !email || !phone || !password || !course) { msg.className = 'message error'; msg.textContent = '❌ Please fill all fields'; return; }
            if (fullName.length < 3) { msg.className = 'message error'; msg.textContent = '❌ Please enter your real full name'; return; }
            if (password !== confirmPassword) { msg.className = 'message error'; msg.textContent = '❌ Passwords do not match'; return; }
            if (password.length < 6) { msg.className = 'message error'; msg.textContent = '❌ Password must be at least 6 characters'; return; }
            
            // Phone validation (Ethiopian format)
            const phoneRegex = /^09[0-9]{8}$/;
            if (!phoneRegex.test(phone)) { msg.className = 'message error'; msg.textContent = '❌ Enter a valid Ethiopian phone number (09xxxxxxxx)'; return; }
            
            // Email validation
            if (isFakeEmail(email)) { msg.className = 'message error'; msg.textContent = '❌ Please use a valid email address (Gmail, Yahoo, Outlook, etc.)'; return; }
            
            btn.disabled = true; msg.className = 'message info'; msg.textContent = '⏳ Creating your account...';
            
            try {
                const uc = await auth.createUserWithEmailAndPassword(email, password);
                const studentId = 'LBC-' + Date.now().toString().slice(-6);
                
                await db.collection('students').doc(uc.user.uid).set({
                    full_name: fullName, email: email, phone: phone, student_id: studentId,
                    enrollment_date: new Date().toISOString().split('T')[0],
                    courses: [course], progress: { [course]: 0 },
                    emailVerified: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // Send verification email
                await uc.user.sendEmailVerification({
                    url: 'https://lovely-beauty-college.firebaseapp.com/__/auth/action',
                    handleCodeInApp: false
                });
                
                msg.className = 'message success';
                msg.innerHTML = `✅ <strong>Registration Successful!</strong><br><br>
                Your Student ID: <strong style="font-size:18px;">${studentId}</strong><br><br>
                📧 <strong>Verification email sent!</strong><br>
                Please check your email and click the verification link before logging in.<br><br>
                <a href="portal.html" style="color:#4CAF50;">→ Go to Student Portal</a>`;
                document.getElementById('regForm').reset();
                
            } catch (error) {
                msg.className = 'message error';
                if (error.code === 'auth/email-already-in-use') msg.textContent = '❌ This email is already registered. Please login.';
                else msg.textContent = '❌ Registration failed: ' + error.message;
            } finally { btn.disabled = false; }
        });
        
        const mmb = document.getElementById('mobileMenuBtn'), nm = document.getElementById('navMenu');
        mmb?.addEventListener('click', () => { nm.classList.toggle('active'); mmb.textContent = nm.classList.contains('active') ? '✕' : '☰'; });
    </script>
