<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | Lovely Beauty College</title>
    <link rel="icon" href="logo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0A0A0A 0%, #1A1A1A 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-container { max-width: 420px; width: 100%; }
        .login-card { background: #1A1A1A; border: 2px solid #D4AF37; border-radius: 24px; padding: 40px 32px; box-shadow: 0 20px 40px rgba(212, 175, 55, 0.15); }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo h1 { font-family: 'Playfair Display', serif; color: #D4AF37; font-size: 26px; letter-spacing: 2px; }
        .logo p { color: #B0B0B0; font-size: 11px; letter-spacing: 2px; }
        h2 { color: #D4AF37; font-family: 'Playfair Display', serif; text-align: center; font-size: 20px; margin-bottom: 8px; }
        .subtitle { color: #B0B0B0; text-align: center; font-size: 13px; margin-bottom: 28px; }
        .input-group { margin-bottom: 18px; }
        label { display: block; color: #D4AF37; font-size: 13px; margin-bottom: 6px; }
        input { width: 100%; padding: 14px 16px; background: #0A0A0A; border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 12px; color: white; font-size: 15px; }
        input:focus { outline: none; border-color: #D4AF37; box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2); }
        .login-btn { width: 100%; padding: 14px; background: #D4AF37; color: #0A0A0A; border: none; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer; margin: 20px 0 16px; transition: all 0.3s; }
        .login-btn:hover { background: #F5D76E; transform: translateY(-2px); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .register-link { text-align: center; color: #B0B0B0; font-size: 13px; }
        .register-link a { color: #D4AF37; text-decoration: none; }
        .back-link { text-align: center; margin-top: 16px; }
        .back-link a { color: #666; text-decoration: none; font-size: 13px; }
        .back-link a:hover { color: #D4AF37; }
        .status { padding: 12px; border-radius: 10px; margin-bottom: 16px; display: none; text-align: center; font-size: 13px; }
        .status.error { display: block; background: rgba(220, 53, 69, 0.15); border: 1px solid #dc3545; color: #dc3545; }
        .status.success { display: block; background: rgba(212, 175, 55, 0.15); border: 1px solid #D4AF37; color: #D4AF37; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1>LOVELY BEAUTY</h1>
                <p>COLLEGE & TRAINING CENTER</p>
            </div>
            <h2>Student Portal</h2>
            <p class="subtitle">Login with your registered email</p>
            
            <div class="status" id="status"></div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="student@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">Login to Portal</button>
            </form>
            
            <div class="register-link">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
            
            <div class="back-link">
                <a href="index.html">← Back to Homepage</a>
            </div>
        </div>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://d5gwP-ofTxVx2feA5AVM3A.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_d5gwP-ofTxVx2feA5AVM3A_EhQcHv8e';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const loginForm = document.getElementById('loginForm');
        const status = document.getElementById('status');
        const loginBtn = document.getElementById('loginBtn');
        
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            status.className = 'status';
            status.textContent = '';
            
            if (!email || !password) {
                status.className = 'status error';
                status.textContent = 'Please enter email and password.';
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                // Get student profile
                const { data: student, error: profileError } = await supabase
                    .from('students')
                    .select('*')
                    .eq('id', data.user.id)
                    .single();
                
                if (profileError) throw profileError;
                
                // Store in localStorage
                localStorage.setItem('lovelyStudent', JSON.stringify({
                    id: data.user.id,
                    email: data.user.email,
                    full_name: student.full_name,
                    student_id: student.student_id,
                    loggedIn: true
                }));
                
                status.className = 'status success';
                status.textContent = '✓ Login successful! Redirecting...';
                
                setTimeout(() => {
                    window.location.href = 'student-dashboard.html';
                }, 1000);
                
            } catch (error) {
                status.className = 'status error';
                status.textContent = '❌ ' + (error.message === 'Invalid login credentials' ? 'Invalid email or password.' : error.message);
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login to Portal';
            }
        });
        
        // Check if already logged in
        const storedStudent = localStorage.getItem('lovelyStudent');
        if (storedStudent) {
            const student = JSON.parse(storedStudent);
            if (student.loggedIn) {
                window.location.href = 'student-dashboard.html';
            }
        }
    </script>
</body>
</html>
