<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Manager | Lovely Beauty College</title>
    <link rel="icon" href="logo.jpg">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0A0A0A;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            color: #D4AF37;
        }
        .loading { text-align: center; }
        .error { color: #dc3545; margin-top: 20px; display: none; }
    </style>
</head>
<body>
    <div class="loading">
        <h1>💎 LOVELY BEAUTY</h1>
        <p id="status">Starting Content Manager...</p>
        <p class="error" id="error"></p>
    </div>
    
    <script type="module">
        // Show status updates
        const statusEl = document.getElementById('status');
        const errorEl = document.getElementById('error');
        
        function updateStatus(msg) {
            statusEl.textContent = msg;
            console.log('Tina CMS:', msg);
        }
        
        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            console.error('Tina CMS Error:', msg);
        }
        
        try {
            updateStatus('Loading Tina CMS...');
            
            // Tina CMS Configuration
            const config = {
                branch: "main",
                clientId: "86aba70b-c964-46f8-9804-8dee298d18a3",
                token: null,
                media: {
                    tina: {
                        mediaRoot: "assets/images/uploads",
                        publicFolder: "",
                    },
                },
                schema: {
                    collections: [
                        {
                            name: "news",
                            label: "News & Events",
                            path: "content/news",
                            format: "md",
                            fields: [
                                { type: "string", name: "title", label: "Title", isTitle: true, required: true },
                                { type: "datetime", name: "date", label: "Publish Date" },
                                { type: "string", name: "category", label: "Category", options: ["News", "Event", "Competition", "Announcement", "Success Story"] },
                                { type: "image", name: "image", label: "Featured Image" },
                                { type: "rich-text", name: "body", label: "Content", isBody: true },
                            ],
                        },
                    ],
                },
            };
            
            // Use the correct Tina CMS URL
            import('https://unpkg.com/tinacms@2.2.0/dist/index.es.js')
                .then((module) => {
                    updateStatus('Creating CMS app...');
                    const createApp = module.createApp || module.default?.createApp;
                    if (!createApp) {
                        throw new Error('Could not find createApp in Tina CMS module');
                    }
                    const app = createApp({ config });
                    updateStatus('Starting CMS...');
                    app.start();
                    updateStatus('CMS Ready!');
                    setTimeout(() => {
                        document.querySelector('.loading').style.display = 'none';
                    }, 500);
                })
                .catch(err => {
                    console.error('Import error:', err);
                    showError('Failed to load Tina CMS. Trying fallback...');
                    
                    // Fallback to known working version
                    import('https://unpkg.com/tinacms@1.5.2/dist/tinacms.es.js')
                        .then((fallbackModule) => {
                            updateStatus('Creating CMS app (fallback)...');
                            const createApp = fallbackModule.createApp;
                            const app = createApp({ config });
                            updateStatus('Starting CMS...');
                            app.start();
                            updateStatus('CMS Ready!');
                            setTimeout(() => {
                                document.querySelector('.loading').style.display = 'none';
                            }, 500);
                        })
                        .catch(fbErr => {
                            showError('Failed to load Tina CMS. Please check your internet connection and try again.');
                            console.error('Fallback error:', fbErr);
                        });
                });
            
        } catch (err) {
            showError('Configuration error: ' + err.message);
        }
    </script>
</body>
</html>
