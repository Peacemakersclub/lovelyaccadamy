<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Lovely Beauty College</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --black-primary: #0A0A0A; --black-card: #1A1A1A; --gold-primary: #D4AF37; --gold-light: #F5D76E; --white: #FFFFFF; --gray-mid: #B0B0B0; --header-height: 70px; --font-heading: 'Playfair Display', serif; --font-body: 'Poppins', sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-body); background: var(--black-primary); color: var(--white); min-height: 100vh; }
        #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .login-card { background: var(--black-card); border: 2px solid var(--gold-primary); border-radius: 24px; padding: 40px 30px; max-width: 420px; width: 100%; text-align: center; }
        .login-card h1 { color: var(--gold-primary); font-family: var(--font-heading); font-size: 24px; margin-bottom: 8px; }
        .login-card p { color: var(--gray-mid); font-size: 14px; margin-bottom: 24px; }
        .input-group { margin-bottom: 14px; text-align: left; }
        .input-group label { display: block; color: var(--gold-primary); font-size: 12px; margin-bottom: 5px; font-weight: 500; }
        input, select, textarea { width: 100%; padding: 13px; background: #0A0A0A; border: 1px solid rgba(212, 175, 55, 0.3); color: var(--white); border-radius: 12px; font-size: 15px; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--gold-primary); }
        button { padding: 14px; background: var(--gold-primary); color: var(--black-primary); border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        button:hover { background: var(--gold-light); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .message { margin-top: 14px; font-weight: 500; font-size: 14px; min-height: 20px; }
        .success { color: #4CAF50; } .error { color: #f44336; } .info { color: #2196F3; }
        #dashboardScreen { display: none; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .header { background: var(--black-card); border: 2px solid var(--gold-primary); border-radius: 20px; padding: 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .header h1 { color: var(--gold-primary); font-family: var(--font-heading); font-size: 22px; }
        .header-btns { display: flex; gap: 10px; flex-wrap: wrap; }
        .header-btns button, .header-btns a { padding: 10px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; text-decoration: none; font-size: 13px; border: none; color: white; }
        .btn-logout { background: #dc3545; } .btn-portal { background: var(--gold-primary); color: var(--black-primary) !important; } .btn-refresh { background: #2196F3; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: var(--black-card); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 16px; padding: 20px; text-align: center; }
        .stat-card h3 { color: var(--gold-primary); font-size: 32px; } .stat-card p { color: var(--gray-mid); font-size: 13px; }
        .card { background: var(--black-card); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .card h3 { color: var(--gold-primary); margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; font-size: 17px; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 15px; }
        .search-bar input { flex: 1; }
        .search-bar button { width: auto; padding: 13px 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { color: var(--gold-primary); text-align: left; padding: 10px 8px; border-bottom: 2px solid var(--gold-primary); }
        td { padding: 10px 8px; border-bottom: 1px solid #333; }
        .action-btn { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; margin: 2px; }
        .edit-btn { background: var(--gold-primary); color: black; } .delete-btn { background: #dc3545; color: white; } .view-btn { background: #2196F3; color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--black-card); border: 2px solid var(--gold-primary); border-radius: 20px; padding: 30px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal-content h2 { color: var(--gold-primary); margin-bottom: 20px; }
        .modal-content input { margin-bottom: 10px; }
        .modal-content button { margin: 5px; }
        .progress-row { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
        .progress-row label { flex: 1; color: var(--gray-mid); font-size: 13px; }
        .progress-row input { width: 70px; text-align: center; }
        @media (max-width: 768px) { table { font-size: 11px; } th, td { padding: 6px 4px; } }
    </style>
</head>
<body>
    <div id="loginScreen">
        <div class="login-card">
            <h1>🔧 Admin Panel</h1>
            <p>Secure Login via Firebase</p>
            <div class="input-group"><label>Email</label><input type="email" id="adminEmail" placeholder="admin@lovelybeauty.edu"></div>
            <div class="input-group"><label>Password</label><input type="password" id="adminPassword" placeholder="••••••••"></div>
            <button onclick="adminLogin()" id="loginBtn">🔐 Login</button>
            <div id="loginMsg" class="message"></div>
        </div>
    </div>
    
    <div id="dashboardScreen">
        <div class="header"><h1>🔧 Admin Dashboard</h1><div class="header-btns"><button class="btn-refresh" onclick="loadAll()">🔄 Refresh</button><a href="portal.html" class="btn-portal">👤 Portal</a><a href="news-events.html" class="btn-portal">📰 News</a><a href="index.html" class="btn-portal">🏠 Site</a><button class="btn-logout" onclick="adminLogout()">🚪 Logout</button></div></div>
        <div class="stats"><div class="stat-card"><h3 id="totalStudents">0</h3><p>Students</p></div><div class="stat-card"><h3 id="totalNews">0</h3><p>News</p></div><div class="stat-card"><h3 id="totalCourses">0</h3><p>Courses</p></div><div class="stat-card"><h3 id="avgProgress">0%</h3><p>Avg Progress</p></div></div>
        
        <!-- SEARCH -->
        <div class="card"><h3>🔍 Search Students</h3><div class="search-bar"><input type="text" id="searchInput" placeholder="Search by name, ID, or email..." onkeyup="filterStudents()"><button onclick="loadStudents()">🔄 Show All</button></div></div>
        
        <!-- STUDENTS TABLE -->
        <div class="card"><h3>📋 All Students</h3><div style="overflow-x:auto;"><table><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Course</th><th>Progress</th><th>Actions</th></tr></thead><tbody id="studentTable"></tbody></table></div></div>
        
        <!-- NEWS SECTION -->
        <div class="card"><h3>📰 Post News</h3><div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;"><input type="text" id="newsTitle" placeholder="Title" style="flex:2;"><input type="date" id="newsDate" style="flex:1;"><select id="newsCategory" style="flex:1;"><option value="News">📰 News</option><option value="Event">📅 Event</option><option value="Announcement">📢 Announcement</option><option value="Success Story">🏆 Success Story</option></select></div><textarea id="newsContent" placeholder="Content..." rows="3" style="width:100%; margin-bottom:10px;"></textarea><input type="text" id="newsImageUrl" placeholder="Image URL (optional)" style="margin-bottom:10px;"><button onclick="postNews()" style="background:#FF9800; color:white;">📰 Post News</button><div id="newsMsg" class="message" style="margin-top:10px;"></div></div>
        <div class="card"><h3>📋 Posted News</h3><table><thead><tr><th>Date</th><th>Title</th><th>Category</th><th>Actions</th></tr></thead><tbody id="newsTable"></tbody></table></div>
    </div>
    
    <!-- EDIT STUDENT MODAL -->
    <div class="modal" id="editModal"><div class="modal-content"><h2>✏️ Edit Student</h2><input type="text" id="editName" placeholder="Full Name"><input type="email" id="editEmail" placeholder="Email"><input type="text" id="editPhone" placeholder="Phone"><input type="text" id="editStudentId" placeholder="Student ID"><h4 style="color:var(--gold-primary); margin:15px 0 10px;">Course Progress:</h4><div id="progressInputs"></div><div style="margin-top:20px;"><button onclick="saveEdit()" style="background:#4CAF50;">💾 Save</button><button onclick="closeModal()" style="background:#666;">Cancel</button><button onclick="deleteStudent()" style="background:#dc3545; float:right;">🗑️ Delete</button></div></div></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCn5PGyIgPobaL8WE4E89dFQwcjsx9Pcqs", authDomain: "lovely-beauty-college.firebaseapp.com", projectId: "lovely-beauty-college", storageBucket: "lovely-beauty-college.firebasestorage.app", messagingSenderId: "283710330376", appId: "1:283710330376:web:d34276a5918500b020e3bd" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let allStudents = [], editingDocId = null;
        
        auth.onAuthStateChanged((user) => {
            if (user) { document.getElementById('loginScreen').style.display = 'none'; document.getElementById('dashboardScreen').style.display = 'block'; loadAll(); }
            else { document.getElementById('loginScreen').style.display = 'flex'; document.getElementById('dashboardScreen').style.display = 'none'; }
        });
        
        async function adminLogin() {
            const email = document.getElementById('adminEmail').value.trim(), password = document.getElementById('adminPassword').value;
            const msg = document.getElementById('loginMsg'), btn = document.getElementById('loginBtn');
            msg.className = 'message'; msg.textContent = '';
            if (!email || !password) { msg.className = 'message error'; msg.textContent = 'Enter email and password'; return; }
            btn.disabled = true; msg.className = 'message info'; msg.textContent = 'Logging in...';
            try { await auth.signInWithEmailAndPassword(email, password); }
            catch (e) { msg.className = 'message error'; msg.textContent = e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found' ? 'Invalid credentials' : e.message; }
            finally { btn.disabled = false; }
        }
        function adminLogout() { auth.signOut(); }
        
        async function loadAll() { await loadStudents(); await loadNews(); }
        
        // STUDENTS
        async function loadStudents() {
            const table = document.getElementById('studentTable');
            table.innerHTML = '<tr><td colspan="7">⏳ Loading...</td></tr>';
            try {
                const snapshot = await db.collection('students').orderBy('createdAt', 'desc').get();
                allStudents = []; table.innerHTML = '';
                snapshot.forEach(doc => { allStudents.push({ id: doc.id, ...doc.data() }); });
                displayStudents(allStudents);
                updateStats();
            } catch (e) { table.innerHTML = '<tr><td colspan="7" style="color:#f44336;">Error loading</td></tr>'; }
        }
        
        function displayStudents(students) {
            const table = document.getElementById('studentTable');
            if (!students.length) { table.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--gray-mid);">No students yet</td></tr>'; return; }
            table.innerHTML = '';
            students.forEach(s => {
                const course = s.courses?.[0] || 'N/A';
                let progHTML = '';
                if (s.courses && s.progress) { s.courses.forEach(c => { const p = s.progress[c] || 0; progHTML += `<div style="font-size:11px;">${c.split(' ')[0]}: ${p}%</div>`; }); }
                table.innerHTML += `<tr><td><strong>${s.student_id||'N/A'}</strong></td><td>${s.full_name||'N/A'}</td><td style="font-size:11px;">${s.email||'N/A'}</td><td>${s.phone||'N/A'}</td><td>${course}</td><td>${progHTML||'N/A'}</td><td><button class="action-btn edit-btn" onclick="openEdit('${s.id}')">✏️</button></td></tr>`;
            });
        }
        
        function updateStats() {
            document.getElementById('totalStudents').textContent = allStudents.length;
            const courses = new Set(); let tp = 0, tc = 0;
            allStudents.forEach(s => { s.courses?.forEach(c => courses.add(c)); if (s.progress) { Object.values(s.progress).forEach(p => { tp += p; tc++; }); } });
            document.getElementById('totalCourses').textContent = courses.size;
            document.getElementById('avgProgress').textContent = tc > 0 ? Math.round(tp/tc) + '%' : '0%';
        }
        
        function filterStudents() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            displayStudents(q ? allStudents.filter(s => (s.full_name||'').toLowerCase().includes(q) || (s.student_id||'').toLowerCase().includes(q) || (s.email||'').toLowerCase().includes(q)) : allStudents);
        }
        
        function openEdit(docId) {
            editingDocId = docId; const s = allStudents.find(x => x.id === docId); if (!s) return;
            document.getElementById('editName').value = s.full_name || '';
            document.getElementById('editEmail').value = s.email || '';
            document.getElementById('editPhone').value = s.phone || '';
            document.getElementById('editStudentId').value = s.student_id || '';
            const div = document.getElementById('progressInputs'); div.innerHTML = '';
            if (s.courses) { s.courses.forEach(c => { const p = s.progress?.[c] || 0; div.innerHTML += `<div class="progress-row"><label>${c}</label><input type="number" value="${p}" min="0" max="100" class="progress-input" data-course="${c}"><span>%</span></div>`; }); }
            document.getElementById('editModal').style.display = 'flex';
        }
        
        async function saveEdit() {
            if (!editingDocId) return;
            const progress = {}; document.querySelectorAll('.progress-input').forEach(i => { progress[i.dataset.course] = parseInt(i.value) || 0; });
            try {
                await db.collection('students').doc(editingDocId).update({
                    full_name: document.getElementById('editName').value.trim(),
                    email: document.getElementById('editEmail').value.trim(),
                    phone: document.getElementById('editPhone').value.trim(),
                    student_id: document.getElementById('editStudentId').value.trim(),
                    progress: progress
                });
                closeModal(); loadStudents();
            } catch (e) { alert('Error: ' + e.message); }
        }
        
        async function deleteStudent() {
            if (!editingDocId || !confirm('Delete this student permanently?')) return;
            try { await db.collection('students').doc(editingDocId).delete(); closeModal(); loadStudents(); }
            catch (e) { alert('Error: ' + e.message); }
        }
        
        function closeModal() { document.getElementById('editModal').style.display = 'none'; editingDocId = null; }
        
        // NEWS
        async function postNews() {
            const title = document.getElementById('newsTitle').value.trim(), date = document.getElementById('newsDate').value || new Date().toISOString().split('T')[0];
            const category = document.getElementById('newsCategory').value, content = document.getElementById('newsContent').value.trim(), image = document.getElementById('newsImageUrl').value.trim();
            const msg = document.getElementById('newsMsg');
            if (!title || !content) { msg.textContent = '❌ Title and content required'; msg.className = 'message error'; return; }
            msg.className = 'message info'; msg.textContent = 'Posting...';
            try {
                await db.collection('news').add({ title, date, category, content, image, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                msg.textContent = '✅ Posted!'; msg.className = 'message success';
                document.getElementById('newsTitle').value = ''; document.getElementById('newsContent').value = ''; document.getElementById('newsImageUrl').value = '';
                loadNews();
            } catch (e) { msg.textContent = '❌ ' + e.message; msg.className = 'message error'; }
        }
        
        async function loadNews() {
            const table = document.getElementById('newsTable');
            table.innerHTML = '<tr><td colspan="4">⏳ Loading...</td></tr>';
            try {
                const snap = await db.collection('news').orderBy('createdAt', 'desc').get();
                table.innerHTML = ''; let t = 0;
                snap.forEach(d => { t++; const n = d.data(); table.innerHTML += `<tr><td>${n.date||'N/A'}</td><td><strong>${n.title}</strong></td><td>${n.category||'News'}</td><td><button class="action-btn delete-btn" onclick="deleteNews('${d.id}')">🗑️</button></td></tr>`; });
                if (t === 0) table.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--gray-mid);">No news yet</td></tr>';
                document.getElementById('totalNews').textContent = t;
            } catch (e) { table.innerHTML = '<tr><td colspan="4" style="color:#f44336;">Error</td></tr>'; }
        }
        
        async function deleteNews(id) { if (confirm('Delete?')) { await db.collection('news').doc(id).delete(); loadNews(); } }
    </script>
</body>
</html>
