<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Lovely Beauty College</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --black-primary: #0A0A0A; --black-card: #1A1A1A; --gold-primary: #D4AF37; --gold-light: #F5D76E; --white: #FFFFFF; --gray-mid: #B0B0B0; --header-height: 70px; --font-heading: 'Playfair Display', serif; --font-body: 'Poppins', sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-body); background: var(--black-primary); color: var(--white); min-height: 100vh; }
        #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .login-card { background: var(--black-card); border: 2px solid var(--gold-primary); border-radius: 24px; padding: 40px 30px; max-width: 420px; width: 100%; text-align: center; }
        .login-card h1 { color: var(--gold-primary); font-family: var(--font-heading); font-size: 24px; margin-bottom: 8px; }
        .login-card p { color: var(--gray-mid); font-size: 14px; margin-bottom: 24px; }
        .input-group { margin-bottom: 14px; text-align: left; }
        .input-group label { display: block; color: var(--gold-primary); font-size: 12px; margin-bottom: 5px; font-weight: 500; }
        input, textarea, select { width: 100%; padding: 13px; background: #0A0A0A; border: 1px solid rgba(212, 175, 55, 0.3); color: var(--white); border-radius: 12px; font-size: 15px; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: var(--gold-primary); }
        button { padding: 14px; background: var(--gold-primary); color: var(--black-primary); border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        button:hover { background: var(--gold-light); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .message { margin-top: 14px; font-weight: 500; font-size: 14px; min-height: 20px; }
        .success { color: #4CAF50; } .error { color: #f44336; } .info { color: #2196F3; }
        #dashboardScreen { display: none; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .header { background: var(--black-card); border: 2px solid var(--gold-primary); border-radius: 20px; padding: 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .header h1 { color: var(--gold-primary); font-family: var(--font-heading); font-size: 22px; }
        .header-btns { display: flex; gap: 10px; flex-wrap: wrap; }
        .header-btns button, .header-btns a { padding: 10px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; text-decoration: none; font-size: 13px; border: none; color: white; }
        .btn-logout { background: #dc3545; } .btn-portal { background: var(--gold-primary); color: var(--black-primary) !important; } .btn-refresh { background: #2196F3; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: var(--black-card); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 16px; padding: 20px; text-align: center; }
        .stat-card h3 { color: var(--gold-primary); font-size: 32px; } .stat-card p { color: var(--gray-mid); font-size: 13px; }
        .card { background: var(--black-card); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .card h3 { color: var(--gold-primary); margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; font-size: 17px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { color: var(--gold-primary); text-align: left; padding: 10px 8px; border-bottom: 2px solid var(--gold-primary); }
        td { padding: 10px 8px; border-bottom: 1px solid #333; }
        .action-btn { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; margin: 2px; }
        .approve-btn { background: #4CAF50; color: white; }
        .delete-btn { background: #dc3545; color: white; }
        .approved-badge { background: #1a3a1a; color: #4CAF50; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-block; }
        .pending-badge { background: #3a2a1a; color: #FF9800; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-block; }
        @media (max-width: 768px) { table { font-size: 11px; } th, td { padding: 6px 4px; } }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="loginScreen">
        <div class="login-card">
            <h1>🔧 Admin Panel</h1>
            <p>Secure Firebase Authentication</p>
            <div class="input-group"><label>Email</label><input type="email" id="adminEmail" placeholder="admin@lovelybeauty.edu"></div>
            <div class="input-group"><label>Password</label><input type="password" id="adminPassword" placeholder="••••••••"></div>
            <button onclick="adminLogin()" id="loginBtn" style="width:100%;">🔐 Login</button>
            <div id="loginMsg" class="message"></div>
        </div>
    </div>
    
    <!-- DASHBOARD -->
    <div id="dashboardScreen">
        <div class="header">
            <h1>🔧 Admin Dashboard</h1>
            <div class="header-btns">
                <button class="btn-refresh" onclick="loadAll()">🔄 Refresh</button>
                <a href="portal.html" class="btn-portal">👤 Portal</a>
                <a href="news-events.html" class="btn-portal">📰 News</a>
                <a href="index.html" class="btn-portal">🏠 Site</a>
                <button class="btn-logout" onclick="adminLogout()">🚪 Logout</button>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-card"><h3 id="totalStudents">0</h3><p>Total Students</p></div>
            <div class="stat-card"><h3 id="pendingCount">0</h3><p>Pending Approval</p></div>
            <div class="stat-card"><h3 id="approvedCount">0</h3><p>Approved</p></div>
            <div class="stat-card"><h3 id="totalNews">0</h3><p>News Posted</p></div>
        </div>
        
        <div class="card">
            <h3>📋 Student Management</h3>
            <div style="overflow-x:auto;">
                <table><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Course</th><th>Status</th><th>Actions</th></tr></thead><tbody id="studentTable"></tbody></table>
            </div>
        </div>
        
        <div class="card">
            <h3>📰 Post News / Event</h3>
            <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;"><input type="text" id="newsTitle" placeholder="News Title" style="flex:2;"><input type="date" id="newsDate" style="flex:1;"></div>
            <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;"><select id="newsCategory" style="flex:1;"><option value="News">📰 News</option><option value="Event">📅 Event</option><option value="Announcement">📢 Announcement</option><option value="Success Story">🏆 Success Story</option></select><input type="text" id="newsImageUrl" placeholder="Image URL (optional)" style="flex:2;"></div>
            <textarea id="newsContent" placeholder="News content..." rows="3" style="width:100%; margin-bottom:10px; resize:vertical;"></textarea>
            <button onclick="postNews()" style="background:#FF9800; color:white; width:100%;">📰 Post News</button>
            <div id="newsMsg" class="message" style="margin-top:10px;"></div>
        </div>
        
        <div class="card">
            <h3>📋 Posted News</h3>
            <table><thead><tr><th>Date</th><th>Title</th><th>Category</th><th>Actions</th></tr></thead><tbody id="newsTable"></tbody></table>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCn5PGyIgPobaL8WE4E89dFQwcjsx9Pcqs", authDomain: "lovely-beauty-college.firebaseapp.com", projectId: "lovely-beauty-college", storageBucket: "lovely-beauty-college.firebasestorage.app", messagingSenderId: "283710330376", appId: "1:283710330376:web:d34276a5918500b020e3bd" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let allStudents = [];
        
        // Auto-login if already authenticated
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboardScreen').style.display = 'block';
                loadAll();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('dashboardScreen').style.display = 'none';
            }
        });
        
        async function adminLogin() {
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const msg = document.getElementById('loginMsg');
            const btn = document.getElementById('loginBtn');
            
            msg.className = 'message'; msg.textContent = '';
            if (!email || !password) { msg.className = 'message error'; msg.textContent = 'Enter email and password'; return; }
            
            btn.disabled = true; msg.className = 'message info'; msg.textContent = 'Authenticating...';
            
            try {
                await auth.signInWithEmailAndPassword(email, password);
                // onAuthStateChanged will handle the rest
            } catch(e) {
                msg.className = 'message error';
                if (e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found') msg.textContent = 'Invalid credentials';
                else if (e.code === 'auth/invalid-email') msg.textContent = 'Invalid email format';
                else msg.textContent = e.message;
                btn.disabled = false;
            }
        }
        
        function adminLogout() { auth.signOut(); }
        
        async function loadAll() { await loadStudents(); await loadNews(); }
        
        async function loadStudents() {
            const table = document.getElementById('studentTable');
            table.innerHTML = '<tr><td colspan="7">⏳ Loading...</td></tr>';
            try {
                const snap = await db.collection('students').orderBy('createdAt', 'desc').get();
                allStudents = []; table.innerHTML = '';
                let pending = 0, approved = 0;
                
                snap.forEach(doc => { allStudents.push({ id: doc.id, ...doc.data() }); });
                
                allStudents.forEach(s => {
                    if (s.approved !== false) approved++; else pending++;
                    
                    const statusHtml = s.approved !== false 
                        ? '<span class="approved-badge">✅ Approved</span>' 
                        : '<span class="pending-badge">⏳ Pending</span>';
                    
                    const actionHtml = s.approved !== false 
                        ? `<button class="action-btn delete-btn" onclick="deleteStudent('${s.id}')">🗑️</button>`
                        : `<button class="action-btn approve-btn" onclick="approveStudent('${s.id}')">✅ Approve</button> <button class="action-btn delete-btn" onclick="deleteStudent('${s.id}')">🗑️</button>`;
                    
                    table.innerHTML += `<tr><td><strong>${s.student_id||'N/A'}</strong></td><td>${s.full_name||'N/A'}</td><td style="font-size:11px;">${s.email||'N/A'}</td><td>${s.phone||'N/A'}</td><td style="font-size:11px;">${s.courses?.[0]||'N/A'}</td><td>${statusHtml}</td><td>${actionHtml}</td></tr>`;
                });
                
                if (allStudents.length === 0) table.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--gray-mid);">No students yet</td></tr>';
                document.getElementById('totalStudents').textContent = allStudents.length;
                document.getElementById('pendingCount').textContent = pending;
                document.getElementById('approvedCount').textContent = approved;
            } catch(e) { table.innerHTML = '<tr><td colspan="7" style="color:#f44336;">Error loading students</td></tr>'; console.error(e); }
        }
        
        async function approveStudent(docId) {
            try { await db.collection('students').doc(docId).update({ approved: true }); alert('✅ Student approved!'); loadStudents(); }
            catch(e) { alert('❌ Error: ' + e.message); }
        }
        
        async function deleteStudent(docId) {
            if (!confirm('⚠️ Delete this student permanently?')) return;
            try { await db.collection('students').doc(docId).delete(); alert('🗑️ Student deleted!'); loadStudents(); }
            catch(e) { alert('❌ Error: ' + e.message); }
        }
        
        async function postNews() {
            const title = document.getElementById('newsTitle').value.trim(), date = document.getElementById('newsDate').value || new Date().toISOString().split('T')[0];
            const category = document.getElementById('newsCategory').value, content = document.getElementById('newsContent').value.trim(), image = document.getElementById('newsImageUrl').value.trim();
            const msg = document.getElementById('newsMsg');
            if (!title || !content) { msg.textContent = '❌ Title and content required'; msg.className = 'message error'; return; }
            msg.className = 'message info'; msg.textContent = 'Posting...';
            try {
                await db.collection('news').add({ title, date, category, content, image, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                msg.textContent = '✅ News posted!'; msg.className = 'message success';
                document.getElementById('newsTitle').value = ''; document.getElementById('newsContent').value = ''; document.getElementById('newsImageUrl').value = '';
                loadNews();
            } catch(e) { msg.textContent = '❌ ' + e.message; msg.className = 'message error'; }
        }
        
        async function loadNews() {
            const table = document.getElementById('newsTable');
            table.innerHTML = '<tr><td colspan="4">⏳ Loading...</td></tr>';
            try {
                const snap = await db.collection('news').orderBy('createdAt', 'desc').get();
                table.innerHTML = ''; let total = 0;
                snap.forEach(doc => { total++; const n = doc.data(); table.innerHTML += `<tr><td>${n.date||'N/A'}</td><td><strong>${n.title}</strong></td><td>${n.category||'News'}</td><td><button class="action-btn delete-btn" onclick="deleteNews('${doc.id}')">🗑️</button></td></tr>`; });
                if (total === 0) table.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--gray-mid);">No news yet</td></tr>';
                document.getElementById('totalNews').textContent = total;
            } catch(e) { table.innerHTML = '<tr><td colspan="4" style="color:#f44336;">Error</td></tr>'; }
        }
        
        async function deleteNews(id) { if (confirm('Delete this news?')) { await db.collection('news').doc(id).delete(); loadNews(); } }
    </script>
</body>
</html>
