<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Lovely Beauty College</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --black-primary: #0A0A0A; --black-card: #1A1A1A; --gold-primary: #D4AF37; --gold-light: #F5D76E; --white: #FFFFFF; --gray-mid: #B0B0B0; --header-height: 70px; --font-heading: 'Playfair Display', serif; --font-body: 'Poppins', sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-body); background: var(--black-primary); color: var(--white); min-height: 100vh; }
        
        #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .login-card { background: var(--black-card); border: 2px solid var(--gold-primary); border-radius: 24px; padding: 40px 30px; max-width: 420px; width: 100%; text-align: center; }
        .login-card h1 { color: var(--gold-primary); font-family: var(--font-heading); font-size: 24px; margin-bottom: 8px; }
        .login-card p { color: var(--gray-mid); font-size: 14px; margin-bottom: 24px; }
        .input-group { margin-bottom: 14px; text-align: left; }
        .input-group label { display: block; color: var(--gold-primary); font-size: 12px; margin-bottom: 5px; font-weight: 500; }
        input { width: 100%; padding: 13px; background: #0A0A0A; border: 1px solid rgba(212, 175, 55, 0.3); color: var(--white); border-radius: 12px; font-size: 15px; }
        input:focus { outline: none; border-color: var(--gold-primary); }
        button { width: 100%; padding: 14px; background: var(--gold-primary); color: var(--black-primary); border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        button:hover { background: var(--gold-light); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .message { margin-top: 14px; font-weight: 500; font-size: 14px; min-height: 20px; }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        .info { color: #2196F3; }
        
        #dashboardScreen { display: none; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .header { background: var(--black-card); border: 2px solid var(--gold-primary); border-radius: 20px; padding: 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .header h1 { color: var(--gold-primary); font-family: var(--font-heading); font-size: 22px; }
        .header-btns { display: flex; gap: 10px; flex-wrap: wrap; }
        .header-btns button, .header-btns a { padding: 10px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; text-decoration: none; font-size: 13px; border: none; color: white; }
        .btn-logout { background: #dc3545; }
        .btn-portal { background: var(--gold-primary); color: var(--black-primary) !important; }
        .btn-refresh { background: #2196F3; }
        
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: var(--black-card); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 16px; padding: 20px; text-align: center; }
        .stat-card h3 { color: var(--gold-primary); font-size: 32px; }
        .stat-card p { color: var(--gray-mid); font-size: 13px; }
        
        .card { background: var(--black-card); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .card h3 { color: var(--gold-primary); margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; font-size: 17px; }
        
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .form-row input, .form-row textarea, .form-row select { padding: 10px; background: #0A0A0A; border: 1px solid rgba(212, 175, 55, 0.3); color: white; border-radius: 8px; flex: 1; min-width: 150px; }
        .form-row textarea { min-height: 80px; resize: vertical; }
        textarea { width: 100%; padding: 10px; background: #0A0A0A; border: 1px solid rgba(212, 175, 55, 0.3); color: white; border-radius: 8px; margin-bottom: 10px; resize: vertical; }
        .post-btn { background: #FF9800; color: white; padding: 12px 24px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { color: var(--gold-primary); text-align: left; padding: 10px 8px; border-bottom: 2px solid var(--gold-primary); }
        td { padding: 10px 8px; border-bottom: 1px solid #333; }
        .action-btn { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; margin: 2px; }
        .delete-btn { background: #dc3545; color: white; }
        
        @media (max-width: 768px) {
            table { font-size: 11px; }
            th, td { padding: 6px 4px; }
            .form-row input, .form-row select { min-width: 100%; }
        }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="loginScreen">
        <div class="login-card">
            <h1>🔧 Admin Panel</h1>
            <p>Secure Login via Firebase</p>
            <div class="input-group"><label>Email</label><input type="email" id="adminEmail" placeholder="admin@lovelybeauty.edu"></div>
            <div class="input-group"><label>Password</label><input type="password" id="adminPassword" placeholder="••••••••"></div>
            <button onclick="adminLogin()" id="loginBtn">🔐 Login</button>
            <div id="loginMsg" class="message"></div>
        </div>
    </div>
    
    <!-- DASHBOARD -->
    <div id="dashboardScreen">
        <div class="header">
            <h1>🔧 Admin Dashboard</h1>
            <div class="header-btns">
                <button class="btn-refresh" onclick="loadAll()">🔄 Refresh</button>
                <a href="portal.html" class="btn-portal">👤 Portal</a>
                <a href="news-events.html" class="btn-portal">📰 News</a>
                <a href="index.html" class="btn-portal">🏠 Site</a>
                <button class="btn-logout" onclick="adminLogout()">🚪 Logout</button>
            </div>
        </div>
        <div class="stats">
            <div class="stat-card"><h3 id="totalStudents">0</h3><p>Students</p></div>
            <div class="stat-card"><h3 id="totalNews">0</h3><p>News Posted</p></div>
        </div>
        
        <!-- POST NEWS -->
        <div class="card">
            <h3>📰 Post News / Event</h3>
            <div class="form-row">
                <input type="text" id="newsTitle" placeholder="News Title" style="flex:2;">
                <input type="date" id="newsDate" style="flex:1;">
            </div>
            <div class="form-row">
                <select id="newsCategory" style="flex:1;">
                    <option value="News">📰 News</option>
                    <option value="Event">📅 Event</option>
                    <option value="Announcement">📢 Announcement</option>
                    <option value="Success Story">🏆 Success Story</option>
                </select>
                <input type="text" id="newsImageUrl" placeholder="Image URL (optional)" style="flex:2;">
            </div>
            <textarea id="newsContent" placeholder="News content..." rows="3"></textarea>
            <button class="post-btn" onclick="postNews()">📰 Post News</button>
            <div id="newsMsg" class="message" style="margin-top:10px;"></div>
        </div>
        
        <!-- NEWS LIST -->
        <div class="card">
            <h3>📋 Posted News</h3>
            <table><thead><tr><th>Date</th><th>Title</th><th>Category</th><th>Actions</th></tr></thead><tbody id="newsTable"></tbody></table>
        </div>
        
        <!-- STUDENT LIST -->
        <div class="card">
            <h3>📋 Students</h3>
            <table><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Course</th></tr></thead><tbody id="studentTable"></tbody></table>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCn5PGyIgPobaL8WE4E89dFQwcjsx9Pcqs", authDomain: "lovely-beauty-college.firebaseapp.com", projectId: "lovely-beauty-college", storageBucket: "lovely-beauty-college.firebasestorage.app", messagingSenderId: "283710330376", appId: "1:283710330376:web:d34276a5918500b020e3bd" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // Check if already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboardScreen').style.display = 'block';
                loadAll();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('dashboardScreen').style.display = 'none';
            }
        });
        
        async function adminLogin() {
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const msg = document.getElementById('loginMsg'), btn = document.getElementById('loginBtn');
            msg.className = 'message'; msg.textContent = '';
            if (!email || !password) { msg.className = 'message error'; msg.textContent = 'Enter email and password'; return; }
            btn.disabled = true; msg.className = 'message info'; msg.textContent = 'Logging in...';
            try {
                await auth.signInWithEmailAndPassword(email, password);
            } catch (e) {
                msg.className = 'message error';
                msg.textContent = e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found' ? 'Invalid credentials' : e.message;
            } finally { btn.disabled = false; }
        }
        
        function adminLogout() { auth.signOut(); }
        
        async function loadAll() { await loadNews(); await loadStudents(); }
        
        async function postNews() {
            const title = document.getElementById('newsTitle').value.trim();
            const date = document.getElementById('newsDate').value || new Date().toISOString().split('T')[0];
            const category = document.getElementById('newsCategory').value;
            const content = document.getElementById('newsContent').value.trim();
            const image = document.getElementById('newsImageUrl').value.trim();
            const msg = document.getElementById('newsMsg');
            if (!title || !content) { msg.textContent = '❌ Title and content required'; msg.className = 'message error'; return; }
            msg.className = 'message info'; msg.textContent = 'Posting...';
            try {
                await db.collection('news').add({ title, date, category, content, image, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                msg.textContent = '✅ News posted!'; msg.className = 'message success';
                document.getElementById('newsTitle').value = ''; document.getElementById('newsContent').value = ''; document.getElementById('newsImageUrl').value = '';
                loadNews();
            } catch (e) { msg.textContent = '❌ Error: ' + e.message; msg.className = 'message error'; }
        }
        
        async function loadNews() {
            const table = document.getElementById('newsTable');
            table.innerHTML = '<tr><td colspan="4">⏳ Loading...</td></tr>';
            try {
                const snapshot = await db.collection('news').orderBy('createdAt', 'desc').get();
                table.innerHTML = ''; let total = 0;
                snapshot.forEach(doc => { total++; const n = doc.data(); table.innerHTML += `<tr><td>${n.date||'N/A'}</td><td><strong>${n.title}</strong></td><td>${n.category||'News'}</td><td><button class="action-btn delete-btn" onclick="deleteNews('${doc.id}')">🗑️</button></td></tr>`; });
                if (total === 0) table.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--gray-mid);">No news yet</td></tr>';
                document.getElementById('totalNews').textContent = total;
            } catch (e) { table.innerHTML = '<tr><td colspan="4" style="color:#f44336;">Error loading</td></tr>'; }
        }
        
        async function deleteNews(docId) { if (confirm('Delete?')) { await db.collection('news').doc(docId).delete(); loadNews(); } }
        
        async function loadStudents() {
            const table = document.getElementById('studentTable');
            table.innerHTML = '<tr><td colspan="4">⏳ Loading...</td></tr>';
            try {
                const snapshot = await db.collection('students').orderBy('createdAt', 'desc').get();
                table.innerHTML = ''; let total = 0;
                snapshot.forEach(doc => { total++; const s = doc.data(); table.innerHTML += `<tr><td>${s.student_id||'N/A'}</td><td>${s.full_name||'N/A'}</td><td>${s.email||'N/A'}</td><td>${s.courses?.[0]||'N/A'}</td></tr>`; });
                if (total === 0) table.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--gray-mid);">No students yet</td></tr>';
                document.getElementById('totalStudents').textContent = total;
            } catch (e) { table.innerHTML = '<tr><td colspan="4" style="color:#f44336;">Error loading</td></tr>'; }
        }
    </script>
</body>
</html>
