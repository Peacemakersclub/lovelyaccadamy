<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Lovely Beauty College</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #0A0A0A; color: white; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header { background: #1A1A1A; border: 2px solid #D4AF37; border-radius: 20px; padding: 25px 30px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .header h1 { color: #D4AF37; font-family: 'Playfair Display', serif; font-size: 24px; }
        .header-links { display: flex; gap: 15px; flex-wrap: wrap; }
        .header-links a { color: #D4AF37; text-decoration: none; padding: 8px 16px; border: 1px solid #D4AF37; border-radius: 20px; font-size: 14px; }
        .header-links a:hover { background: #D4AF37; color: black; }
        
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1A1A1A; border: 1px solid #D4AF37; border-radius: 16px; padding: 20px; text-align: center; }
        .stat-card h3 { color: #D4AF37; font-size: 36px; margin-bottom: 5px; }
        .stat-card p { color: #aaa; font-size: 14px; }
        
        .card { background: #1A1A1A; border: 1px solid #D4AF37; border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .card h3 { color: #D4AF37; margin-bottom: 20px; font-size: 20px; }
        
        .add-student-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .add-student-form input, .add-student-form select { padding: 12px; background: black; border: 1px solid #D4AF37; color: white; border-radius: 8px; width: 100%; }
        .add-student-form button { grid-column: span 2; padding: 12px; background: #D4AF37; color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { color: #D4AF37; text-align: left; padding: 12px 8px; border-bottom: 2px solid #D4AF37; font-size: 14px; }
        td { padding: 10px 8px; border-bottom: 1px solid #333; font-size: 13px; }
        .progress-bar { height: 6px; background: #333; border-radius: 3px; min-width: 80px; }
        .progress-fill { height: 100%; background: #D4AF37; border-radius: 3px; }
        
        .action-btn { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; margin: 2px; }
        .edit-btn { background: #D4AF37; color: black; }
        .delete-btn { background: #dc3545; color: white; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #1A1A1A; border: 2px solid #D4AF37; border-radius: 20px; padding: 30px; max-width: 500px; width: 90%; }
        .modal-content h2 { color: #D4AF37; margin-bottom: 20px; }
        .modal-content input { width: 100%; padding: 10px; margin: 8px 0; background: black; border: 1px solid #D4AF37; color: white; border-radius: 8px; }
        .modal-content button { padding: 10px 20px; background: #D4AF37; color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 5px; }
        
        @media (max-width: 768px) {
            .add-student-form { grid-template-columns: 1fr; }
            .add-student-form button { grid-column: span 1; }
            table { font-size: 11px; }
            th, td { padding: 8px 4px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 Admin Panel</h1>
            <div class="header-links">
                <a href="portal.html">👤 Student Portal</a>
                <a href="index.html">🏠 Main Site</a>
                <a href="students.json" target="_blank">📄 JSON Data</a>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-card"><h3 id="totalStudents">0</h3><p>Total Students</p></div>
            <div class="stat-card"><h3 id="totalCourses">0</h3><p>Unique Courses</p></div>
            <div class="stat-card"><h3 id="avgProgress">0%</h3><p>Avg Progress</p></div>
        </div>
        
        <div class="card">
            <h3>➕ Add New Student</h3>
            <div class="add-student-form">
                <input type="text" id="newName" placeholder="Full Name">
                <input type="email" id="newEmail" placeholder="Email">
                <input type="text" id="newPhone" placeholder="Phone">
                <input type="text" id="newStudentId" placeholder="Student ID (e.g., LBC-004)">
                <input type="text" id="newCourses" placeholder="Courses (comma separated)">
                <button onclick="addStudent()">Add Student</button>
            </div>
        </div>
        
        <div class="card">
            <h3>📋 All Students</h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr><th>ID</th><th>Name</th><th>Email</th><th>Courses</th><th>Progress</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="studentTable"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- Edit Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <h2>✏️ Edit Student</h2>
            <input type="text" id="editName" placeholder="Full Name">
            <input type="email" id="editEmail" placeholder="Email">
            <input type="text" id="editPhone" placeholder="Phone">
            <p style="color:#D4AF37; margin-top:10px;">Update Progress:</p>
            <div id="progressInputs"></div>
            <div style="margin-top:20px;">
                <button onclick="saveEdit()">💾 Save</button>
                <button onclick="closeModal()" style="background:#666;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let students = [];
        let editingStudentId = null;
        
        async function loadStudents() {
            try {
                const response = await fetch('students.json');
                students = await response.json();
                displayStudents();
                updateStats();
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        function displayStudents() {
            const table = document.getElementById('studentTable');
            table.innerHTML = '';
            
            students.forEach(student => {
                const coursesList = student.courses?.join(', ') || 'None';
                let progressHTML = '';
                
                if (student.courses && student.progress) {
                    student.courses.forEach(course => {
                        const p = student.progress[course] || 0;
                        progressHTML += `
                            <div style="margin-bottom:5px;">
                                <small>${course.split(' ')[0]}: ${p}%</small>
                                <div class="progress-bar"><div class="progress-fill" style="width:${p}%;"></div></div>
                            </div>
                        `;
                    });
                }
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${student.student_id}</td>
                    <td>${student.full_name}</td>
                    <td>${student.email}</td>
                    <td style="font-size:11px;">${coursesList}</td>
                    <td>${progressHTML || 'N/A'}</td>
                    <td>
                        <button class="action-btn edit-btn" onclick="openEdit('${student.student_id}')">✏️</button>
                    </td>
                `;
                table.appendChild(row);
            });
        }
        
        function updateStats() {
            document.getElementById('totalStudents').textContent = students.length;
            
            const allCourses = new Set();
            let totalProgress = 0;
            let count = 0;
            
            students.forEach(s => {
                s.courses?.forEach(c => allCourses.add(c));
                if (s.progress) {
                    Object.values(s.progress).forEach(p => { totalProgress += p; count++; });
                }
            });
            
            document.getElementById('totalCourses').textContent = allCourses.size;
            document.getElementById('avgProgress').textContent = count > 0 ? Math.round(totalProgress / count) + '%' : '0%';
        }
        
        function addStudent() {
            const name = document.getElementById('newName').value.trim();
            const email = document.getElementById('newEmail').value.trim();
            const phone = document.getElementById('newPhone').value.trim();
            const studentId = document.getElementById('newStudentId').value.trim().toUpperCase();
            const coursesStr = document.getElementById('newCourses').value.trim();
            
            if (!name || !studentId) {
                alert('Name and Student ID are required!');
                return;
            }
            
            const courses = coursesStr ? coursesStr.split(',').map(c => c.trim()) : [];
            const progress = {};
            courses.forEach(c => { progress[c] = 0; });
            
            const newStudent = {
                id: String(students.length + 1),
                full_name: name,
                email: email,
                phone: phone,
                student_id: studentId,
                enrollment_date: new Date().toISOString().split('T')[0],
                courses: courses,
                progress: progress
            };
            
            students.push(newStudent);
            displayStudents();
            updateStats();
            
            // Clear form
            ['newName','newEmail','newPhone','newStudentId','newCourses'].forEach(id => {
                document.getElementById(id).value = '';
            });
            
            alert('✅ Student added! Update students.json on GitHub to make permanent.');
        }
        
        function openEdit(studentId) {
            editingStudentId = studentId;
            const student = students.find(s => s.student_id === studentId);
            if (!student) return;
            
            document.getElementById('editName').value = student.full_name;
            document.getElementById('editEmail').value = student.email || '';
            document.getElementById('editPhone').value = student.phone || '';
            
            // Build progress inputs
            const progressDiv = document.getElementById('progressInputs');
            progressDiv.innerHTML = '';
            
            if (student.courses) {
                student.courses.forEach(course => {
                    const p = student.progress?.[course] || 0;
                    progressDiv.innerHTML += `
                        <div style="display:flex; align-items:center; gap:10px; margin:5px 0;">
                            <label style="flex:1; color:#D4AF37;">${course}</label>
                            <input type="number" value="${p}" min="0" max="100" class="progress-input" data-course="${course}" style="width:70px;">
                            <span>%</span>
                        </div>
                    `;
                });
            }
            
            document.getElementById('editModal').style.display = 'flex';
        }
        
        function saveEdit() {
            const student = students.find(s => s.student_id === editingStudentId);
            if (!student) return;
            
            student.full_name = document.getElementById('editName').value;
            student.email = document.getElementById('editEmail').value;
            student.phone = document.getElementById('editPhone').value;
            
            // Update progress
            document.querySelectorAll('.progress-input').forEach(input => {
                const course = input.dataset.course;
                student.progress[course] = parseInt(input.value) || 0;
            });
            
            displayStudents();
            updateStats();
            closeModal();
            alert('✅ Changes made! Update students.json on GitHub to make permanent.');
        }
        
        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
            editingStudentId = null;
        }
        
        loadStudents();
    </script>
</body>
</html>
