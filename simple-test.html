<!DOCTYPE html>
<html>
<head>
    <title>Simple Supabase Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
    <h1>Supabase Connection Test</h1>
    <input type="email" id="email" placeholder="Email" value="test@test.com">
    <input type="password" id="password" placeholder="Password" value="test123">
    <button onclick="testSignUp()">Test Sign Up</button>
    <button onclick="testSignIn()">Test Sign In</button>
    <pre id="result" style="background:#111; color:#0f0; padding:10px;"></pre>

    <script>
        const SUPABASE_URL = 'https://pmdrwwaztyfffnkrvwkq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtZHJ3d2F6dHlmZmZua3J2d2txIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODAzNzYsImV4cCI6MjA5MTY1NjM3Nn0.IKQ1eevZaO6uluDUU8PaqrD4uuQNy_Ex61n_dD2Qa8g';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const resultEl = document.getElementById('result');

        async function testSignUp() {
            resultEl.textContent = 'Testing sign up...';
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const { data, error } = await supabase.auth.signUp({ email, password });
            
            if (error) {
                resultEl.textContent = '❌ SIGN UP ERROR:\n' + JSON.stringify(error, null, 2);
            } else {
                resultEl.textContent = '✅ SIGN UP SUCCESS!\n' + JSON.stringify(data, null, 2);
            }
        }

        async function testSignIn() {
            resultEl.textContent = 'Testing sign in...';
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                resultEl.textContent = '❌ SIGN IN ERROR:\n' + JSON.stringify(error, null, 2);
            } else {
                resultEl.textContent = '✅ SIGN IN SUCCESS!\n' + JSON.stringify(data, null, 2);
            }
        }
    </script>
</body>
</html>
