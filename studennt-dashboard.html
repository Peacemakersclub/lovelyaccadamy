<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | Lovely Beauty College</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #0A0A0A; color: white; }
        .header { background: #0A0A0A; border-bottom: 2px solid #D4AF37; padding: 15px 20px; position: sticky; top: 0; }
        .header h1 { color: #D4AF37; font-family: 'Playfair Display', serif; font-size: 20px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .welcome-banner { background: linear-gradient(135deg, #D4AF37, #996515); color: black; padding: 30px; border-radius: 20px; margin-bottom: 30px; }
        .welcome-banner h2 { font-size: 28px; margin-bottom: 10px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1A1A1A; border: 1px solid #D4AF37; border-radius: 15px; padding: 20px; text-align: center; }
        .stat-card h3 { color: #D4AF37; font-size: 32px; margin-bottom: 5px; }
        .stat-card p { color: #aaa; font-size: 14px; }
        
        .dashboard-card { background: #1A1A1A; border: 1px solid #D4AF37; border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .dashboard-card h3 { color: #D4AF37; margin-bottom: 20px; font-size: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .course-item { display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid #333; }
        .course-item:last-child { border-bottom: none; }
        .course-icon { width: 50px; height: 50px; background: #D4AF37; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-right: 15px; font-size: 24px; color: black; }
        .course-info h4 { margin-bottom: 5px; }
        .course-info p { color: #aaa; font-size: 13px; }
        
        .logout-btn { background: #dc3545; color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .logout-btn:hover { background: #c82333; }
        
        .empty-state { text-align: center; padding: 40px; color: #aaa; }
        .student-info { display: flex; align-items: center; margin-bottom: 20px; }
        .avatar { width: 60px; height: 60px; background: #D4AF37; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: black; margin-right: 15px; }
    </style>
</head>
<body>
    <header class="header">
        <h1>🎓 LOVELY BEAUTY COLLEGE</h1>
    </header>
    
    <div class="container">
        <div class="student-info">
            <div class="avatar" id="studentInitials">ST</div>
            <div>
                <h2 id="studentName">Loading...</h2>
                <p id="studentId" style="color:#D4AF37;">Student ID: --</p>
            </div>
        </div>
        
        <div class="welcome-banner">
            <h2>Welcome back, <span id="firstName">Student</span>! 👋</h2>
            <p>Here's your learning progress overview</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="activeCourses">0</h3>
                <p>Active Courses</p>
            </div>
            <div class="stat-card">
                <h3 id="attendanceRate">90%</h3>
                <p>Attendance Rate</p>
            </div>
            <div class="stat-card">
                <h3 id="certificateCount">0</h3>
                <p>Certificates</p>
            </div>
        </div>
        
        <div class="dashboard-card">
            <h3>📚 My Courses</h3>
            <div id="coursesList">
                <div class="empty-state">Loading your courses...</div>
            </div>
        </div>
        
        <div class="dashboard-card">
            <h3>📅 Recent Activity</h3>
            <div id="activityList">
                <div class="empty-state">Loading activity...</div>
            </div>
        </div>
        
        <button class="logout-btn" onclick="logout()">🚪 Logout</button>
    </div>

    <script>
        // Load student data from session storage
        function loadDashboard() {
            const studentData = sessionStorage.getItem('currentStudent');
            
            if (!studentData) {
                // No student data - redirect to login
                window.location.href = 'login-now.html';
                return;
            }
            
            const student = JSON.parse(studentData);
            
            // Update UI with student info
            document.getElementById('studentName').textContent = student.full_name || 'Student';
            document.getElementById('studentId').textContent = 'Student ID: ' + (student.student_id || 'N/A');
            document.getElementById('firstName').textContent = student.full_name?.split(' ')[0] || 'Student';
            
            // Set initials
            const initials = student.full_name 
                ? student.full_name.split(' ').map(n => n[0]).join('').toUpperCase()
                : 'ST';
            document.getElementById('studentInitials').textContent = initials;
            
            // For demo - show a sample course
            document.getElementById('coursesList').innerHTML = `
                <div class="course-item">
                    <div class="course-icon">💇</div>
                    <div class="course-info">
                        <h4>Hairdressing & Barbering</h4>
                        <p>Progress: 45% | Next class: Monday, 10:00 AM</p>
                    </div>
                </div>
                <div class="course-item">
                    <div class="course-icon">💄</div>
                    <div class="course-info">
                        <h4>Makeup Artistry</h4>
                        <p>Progress: 20% | Next class: Wednesday, 2:00 PM</p>
                    </div>
                </div>
            `;
            
            document.getElementById('activeCourses').textContent = '2';
            
            // Sample activity
            document.getElementById('activityList').innerHTML = `
                <div style="padding:10px 0; border-bottom:1px solid #333;">
                    <p>✅ Attended Hairdressing class - April 22</p>
                    <p style="color:#aaa; font-size:12px;">Yesterday</p>
                </div>
                <div style="padding:10px 0; border-bottom:1px solid #333;">
                    <p>📝 Submitted makeup assignment</p>
                    <p style="color:#aaa; font-size:12px;">April 20</p>
                </div>
                <div style="padding:10px 0;">
                    <p>🎓 Enrolled in Makeup Artistry</p>
                    <p style="color:#aaa; font-size:12px;">April 15</p>
                </div>
            `;
        }
        
        function logout() {
            sessionStorage.removeItem('currentStudent');
            window.location.href = 'login-now.html';
        }
        
        // Load dashboard on page load
        loadDashboard();
    </script>
</body>
</html>
